<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentLens — AI Context Cost Scanner</title>
<meta name="description" content="Scan any GitHub repo to detect AI agent config files (AGENTS.md, CLAUDE.md, .cursorrules, copilot-instructions), resolve referenced files, and calculate the real context cost per request across all major LLM providers.">
<meta name="author" content="AgentLens">
<meta name="theme-color" content="#2547f4">
<meta property="og:title" content="AgentLens — AI Context Cost Scanner">
<meta property="og:description" content="Detect AI agent configs in any repo. Calculate real context token costs across Claude, GPT, Gemini. Dedup shared references. Project team-wide spending.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="AgentLens — AI Context Cost Scanner">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%232547f4'/><stop offset='100%25' stop-color='%2322d3ee'/></linearGradient></defs><circle cx='42' cy='42' r='28' fill='none' stroke='url(%23g)' stroke-width='8'/><line x1='62' y1='62' x2='90' y2='90' stroke='url(%23g)' stroke-width='10' stroke-linecap='round'/><circle cx='42' cy='42' r='12' fill='%232547f4' opacity='.3'/></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --blue:#2547f4;--blue-d:#1a35c7;
  --cyan:#22d3ee;
  --green:#10b981;
  --orange:#f59e0b;
  --red:#ef4444;
  --purple:#8b5cf6;
  --yellow:#f59e0b;
  --teal:#14b8a6;
  --pink:#ec4899;
}
/* ── Dark theme (default) ── */
[data-theme="dark"]{
  --blue-l:rgba(37,71,244,.15);
  --cyan-l:rgba(34,211,238,.15);
  --green-l:rgba(16,185,129,.15);
  --orange-l:rgba(245,158,11,.15);
  --red-l:rgba(239,68,68,.15);
  --purple-l:rgba(139,92,246,.15);
  --yellow-l:rgba(245,158,11,.15);
  --teal-l:rgba(20,184,166,.15);
  --pink-l:rgba(236,72,153,.15);
  --bg:#080c18;
  --card:#0f1629;
  --card-alt:#0b1020;
  --card-border:rgba(255,255,255,.07);
  --card-border-hover:rgba(37,71,244,.45);
  --g50:#0b1020;--g100:#111827;--g200:rgba(255,255,255,.08);--g300:rgba(255,255,255,.14);
  --g400:#475569;--g500:#64748b;--g700:#94a3b8;--g900:#e2e8f0;
  --hero-bg:linear-gradient(160deg,#0a0f22 0%,#0d1535 50%,#0a0f22 100%);
  --hero-glow:rgba(37,71,244,.18);
  --hero-text:#fff;
  --hero-border:rgba(255,255,255,.07);
  --toggle-bg:rgba(255,255,255,.07);
  --toggle-active-bg:rgba(37,71,244,.35);
  --toggle-color:rgba(255,255,255,.5);
  --toggle-active-color:#fff;
  --theme-icon:"☀️";
}
/* ── Light theme ── */
[data-theme="light"]{
  --blue-l:#eff6ff;
  --cyan-l:#ecfeff;
  --green-l:#f0fdf4;
  --orange-l:#fff7ed;
  --red-l:#fef2f2;
  --purple-l:#faf5ff;
  --yellow-l:#fefce8;
  --teal-l:#f0fdfa;
  --pink-l:#fdf2f8;
  --bg:#f1f5f9;
  --card:#ffffff;
  --card-alt:#f8fafc;
  --card-border:#e2e8f0;
  --card-border-hover:#bfdbfe;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g700:#475569;--g900:#1e293b;
  --hero-bg:linear-gradient(160deg,#1e3a8a 0%,#2547f4 55%,#1d4ed8 100%);
  --hero-glow:rgba(37,71,244,.25);
  --hero-text:#fff;
  --hero-border:rgba(255,255,255,.15);
  --toggle-bg:rgba(255,255,255,.15);
  --toggle-active-bg:rgba(255,255,255,.3);
  --toggle-color:rgba(255,255,255,.7);
  --toggle-active-color:#fff;
  --theme-icon:"🌙";
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--g900);line-height:1.6}
.hero{background:var(--hero-bg);color:var(--hero-text);padding:14px 20px;position:relative;border-bottom:1px solid var(--hero-border)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,var(--hero-glow) 0%,transparent 70%);pointer-events:none}
.hero-inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:16px;align-items:center;position:relative;z-index:1}
.brand-lockup{display:flex;align-items:center;gap:10px;min-width:0}
.brand-mark{width:14px;height:14px;border-radius:4px;background:linear-gradient(135deg,#93c5fd,var(--cyan));box-shadow:0 0 18px rgba(34,211,238,.35)}
.brand-name{font-size:1rem;font-weight:800;letter-spacing:-.04em;color:#fff;white-space:nowrap}
.hero-sub{display:none}
.hero-controls{display:flex;align-items:center;gap:8px;justify-self:end}
.lang-toggle{display:flex;gap:0;background:var(--toggle-bg);border:1px solid var(--hero-border);border-radius:8px;overflow:hidden}
.lang-btn{padding:6px 14px;font-size:.8rem;font-weight:700;color:var(--toggle-color);background:none;border:none;cursor:pointer;transition:.15s}
.lang-btn.active{background:var(--toggle-active-bg);color:var(--toggle-active-color)}
.theme-toggle-btn{background:var(--toggle-bg);border:1px solid var(--hero-border);border-radius:8px;padding:6px 10px;font-size:.88rem;cursor:pointer;transition:.15s;line-height:1}
.container{max-width:980px;margin:0 auto;padding:0 20px}
.input-section{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:28px 32px;margin:0 auto 24px;max-width:800px;position:relative;z-index:10}
.input-label{font-size:.78rem;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block}
.input-row{display:flex;gap:10px}
.repo-input{flex:1;padding:12px 16px;border:1px solid var(--card-border);border-radius:8px;font-size:.95rem;outline:none;color:var(--g900);background:var(--card-alt);font-family:'Space Grotesk',sans-serif;transition:.2s}
.repo-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,71,244,.2)}
.fetch-btn{padding:12px 22px;background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:7px;font-family:'Space Grotesk',sans-serif;transition:.2s;box-shadow:0 0 20px rgba(37,71,244,.3)}
.fetch-btn:hover{box-shadow:0 0 28px rgba(37,71,244,.5);transform:translateY(-1px)}
.fetch-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.examples{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.examples span{font-size:.78rem;color:var(--g500);font-weight:600}
.example-chip{background:rgba(37,71,244,.12);color:var(--cyan);border:1px solid rgba(34,211,238,.2);border-radius:99px;padding:2px 11px;font-size:.76rem;font-weight:600;cursor:pointer;transition:.15s}
.example-chip:hover{background:rgba(34,211,238,.15);border-color:var(--cyan)}
/* STATUS */
#status-area{margin-bottom:20px}
.status-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;font-weight:600;font-size:.92rem}
.status-card.loading{border-left:3px solid var(--blue)}
.status-card.error{border-left:3px solid var(--red)}
.status-card.warn{border-left:3px solid var(--yellow)}
.spinner{width:18px;height:18px;border:2px solid rgba(37,71,244,.25);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
/* MAIN TABS */
.main-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;overflow:hidden}
.main-tab{flex:1;padding:13px;text-align:center;font-weight:700;font-size:.9rem;cursor:pointer;border:none;background:none;color:var(--g500);transition:.2s;border-bottom:2px solid transparent;font-family:'Space Grotesk',sans-serif}
.main-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.main-tab:hover:not(.active){color:var(--g700);background:rgba(255,255,255,.03)}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:16px;text-align:center}
.stat-num{font-size:1.65rem;font-weight:800;line-height:1;margin-bottom:3px}
.stat-label{font-size:.7rem;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat-card.blue .stat-num{color:var(--blue)}.stat-card.green .stat-num{color:var(--green)}.stat-card.purple .stat-num{color:var(--purple)}.stat-card.orange .stat-num{color:var(--orange)}.stat-card.teal .stat-num{color:var(--teal)}.stat-card.pink .stat-num{color:var(--pink)}
/* TOOL GRID */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;margin-bottom:24px}
.tool-card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px;transition:.2s}
.tool-card.found{border-color:rgba(16,185,129,.35);box-shadow:0 0 12px rgba(16,185,129,.08)}.tool-card.missing{opacity:.3}
.tool-icon{font-size:1.3rem;flex-shrink:0}
.tool-info .tool-name{font-weight:700;font-size:.84rem;margin-bottom:1px;color:var(--g900)}
.tool-info .tool-file{font-family:monospace;font-size:.72rem;color:var(--g500)}
.found-dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0;box-shadow:0 0 6px var(--green)}
[data-theme="light"] .found-dot{box-shadow:none}
[data-theme="light"] .tool-card.found{box-shadow:none}
.miss-dot{width:8px;height:8px;border-radius:50%;background:var(--g400);margin-left:auto;flex-shrink:0}
/* SECTION */
.section{padding:0 0 28px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-header h2{font-size:1rem;font-weight:800;color:var(--g900)}
.pill{border-radius:99px;padding:2px 10px;font-size:.7rem;font-weight:700;background:var(--blue-l);color:var(--blue);border:1px solid rgba(37,71,244,.25)}
.pill.green{background:var(--green-l);color:var(--green);border-color:rgba(16,185,129,.25)}
.pill.teal{background:var(--teal-l);color:var(--teal);border-color:rgba(20,184,166,.25)}
/* CONTEXT TREE */
.context-tree{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:18px;margin-bottom:24px;font-family:monospace;font-size:.84rem}
.tree-item{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px dashed var(--g200)}
.tree-item:last-child{border-bottom:none}
.t-path{flex:1;color:var(--cyan)}.t-path.root{color:var(--g900);font-weight:700}.t-path.dedup{color:var(--g400);text-decoration:line-through}
.t-right{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
.t-tok{color:var(--g500);font-size:.73rem}
.t-tool{font-size:.67rem;padding:1px 7px;border-radius:99px;font-weight:700}
/* FILE BLOCKS */
.agent-file-block{background:var(--card);border:1px solid var(--card-border);border-radius:12px;overflow:hidden;margin-bottom:14px}
.agent-file-header{background:var(--card-alt);border-bottom:1px solid var(--card-border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;cursor:pointer;user-select:none;transition:.15s}
.agent-file-header:hover{background:rgba(37,71,244,.1)}
.agent-file-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.88rem}
.file-badge{background:rgba(37,71,244,.2);color:var(--cyan);border:1px solid rgba(34,211,238,.2);border-radius:5px;padding:2px 9px;font-family:monospace;font-size:.74rem;font-weight:600}
.agent-file-body{display:none}.agent-file-body.open{display:block}
.tab-bar{display:flex;border-bottom:1px solid var(--card-border);padding:0 18px;background:var(--card)}
.tab-btn{padding:10px 14px;border:none;background:none;cursor:pointer;font-size:.84rem;font-weight:600;color:var(--g500);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;font-family:'Space Grotesk',sans-serif}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.tab-content{display:none;padding:18px}.tab-content.active{display:block}
.md-body{line-height:1.75;color:var(--g700)}.md-body h1,.md-body h2,.md-body h3{color:var(--g900);font-weight:800;margin:18px 0 6px}
.md-body h1{font-size:1.3rem}.md-body h2{font-size:1.05rem}.md-body h3{font-size:.95rem}
.md-body p{margin-bottom:10px}.md-body ul,.md-body ol{margin:6px 0 10px 18px}.md-body li{margin-bottom:3px}
.md-body code{background:rgba(139,92,246,.15);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:.86em;color:var(--purple)}
.md-body pre{background:#060a14;color:#e2e8f0;border:1px solid var(--card-border);border-radius:8px;padding:16px;overflow-x:auto;margin:12px 0;font-family:monospace;font-size:.84em;line-height:1.6}
.md-body pre code{background:none;color:inherit;padding:0}.md-body a{color:var(--cyan)}
.md-body blockquote{border-left:3px solid rgba(37,71,244,.5);background:rgba(37,71,244,.07);padding:10px 14px;margin:10px 0;border-radius:0 6px 6px 0}
.raw-code{background:#060a14;color:#e2e8f0;border:1px solid var(--card-border);border-radius:8px;padding:18px;overflow-x:auto;font-family:monospace;font-size:.82em;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:420px;overflow-y:auto}
/* REFS */
.refs-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.ref-card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;overflow:hidden;border-left:3px solid var(--blue)}
.ref-card.not-found{border-left-color:var(--g400);opacity:.55}
.ref-card.heavy{border-left-color:var(--orange);border-color:rgba(245,158,11,.3)}
.ref-tag.heavy{background:var(--orange-l);color:var(--orange)}
.heavy-warn-panel{border-top:1px solid rgba(245,158,11,.25);background:rgba(245,158,11,.05);padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.heavy-warn-intro{font-size:.82rem;color:var(--orange);font-weight:600;display:flex;align-items:flex-start;gap:7px}
.heavy-warn-intro span{line-height:1.5}
.heavy-fixes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:900px){.heavy-fixes{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.heavy-fixes{grid-template-columns:1fr}}
.heavy-fix{background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:11px 13px;display:flex;flex-direction:column;gap:5px}
.heavy-fix-title{font-size:.78rem;font-weight:700;color:var(--g900)}
.heavy-fix-desc{font-size:.75rem;color:var(--g500);line-height:1.45}
.heavy-fix-code{font-family:monospace;font-size:.72rem;background:var(--g50);border:1px solid var(--g200);border-radius:5px;padding:7px 9px;white-space:pre;overflow-x:auto;color:var(--g700);margin-top:2px;line-height:1.5}
.ref-card-header{padding:11px 16px;background:var(--card-alt);border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;cursor:pointer;user-select:none;transition:.15s}
.ref-card-header:hover{background:rgba(37,71,244,.1)}
.ref-path{font-family:monospace;font-size:.84rem;font-weight:700;color:var(--g900)}
.ref-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ref-tag{border-radius:99px;padding:1px 9px;font-size:.7rem;font-weight:700;text-transform:uppercase}
.ref-tag.found{background:var(--green-l);color:var(--green)}.ref-tag.missing{background:var(--red-l);color:var(--red)}
.ref-tag.type{background:var(--purple-l);color:var(--purple)}.ref-tag.shared{background:var(--teal-l);color:var(--teal)}
.token-badge{background:var(--blue-l);color:var(--blue);border:1px solid rgba(37,71,244,.25);border-radius:99px;padding:2px 9px;font-size:.72rem;font-weight:700}
.ref-content{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.ref-content.open{max-height:520px;padding:16px;overflow-y:auto}
/* COST TAB */
.cost-section{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:22px;margin-bottom:18px}
.cost-section h3{font-size:.95rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--g900)}
.controls-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:600px){.controls-grid{grid-template-columns:1fr}}
.control-group label{display:block;font-size:.76rem;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.control-group select,.control-group input[type=number]{width:100%;padding:9px 12px;border:1px solid var(--card-border);border-radius:8px;font-size:.88rem;outline:none;background:var(--card-alt);color:var(--g900);font-family:'Space Grotesk',sans-serif;transition:.2s}
.control-group select:focus,.control-group input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,71,244,.15)}
.control-group select option{background:#0f1629;color:var(--g900)}
.slider-group{margin-bottom:14px}
.slider-group label{display:flex;justify-content:space-between;font-size:.76rem;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.slider-group label span.val{color:var(--cyan);font-size:.9rem}
input[type=range]{width:100%;accent-color:var(--blue);height:6px;cursor:pointer}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.toggle-row label{font-size:.82rem;font-weight:600;color:var(--g700)}
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--g400);border-radius:24px;transition:.2s}
.toggle .slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--blue)}
.toggle input:checked+.slider:before{transform:translateX(20px)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--card-alt);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--card-border)}
.kpi .k-num{font-size:1.45rem;font-weight:800;line-height:1;margin-bottom:2px}
.kpi .k-label{font-size:.7rem;color:var(--g500);font-weight:600;text-transform:uppercase}
.kpi.blue .k-num{color:var(--blue)}.kpi.green .k-num{color:var(--green)}.kpi.orange .k-num{color:var(--orange)}.kpi.red .k-num{color:var(--red)}.kpi.purple .k-num{color:var(--purple)}
.chart-box{position:relative;width:100%;height:280px;margin-bottom:14px}
.comparison-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px}
.comparison-table th{background:var(--card-alt);font-weight:700;text-align:left;padding:10px 12px;border-bottom:1px solid var(--card-border);color:var(--g700)}
.comparison-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--g900)}
.comparison-table tr:hover td{background:rgba(37,71,244,.07)}
.comparison-table th.sortable:hover{color:var(--cyan);cursor:pointer}
.comparison-table .num{text-align:right;font-family:monospace;font-weight:600}
.savings-banner{background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.3);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.savings-banner .s-icon{font-size:1.6rem;flex-shrink:0}
.savings-banner .s-body{flex:1}
.savings-banner .s-title{font-weight:800;font-size:.88rem;color:var(--teal)}
.savings-banner .s-detail{font-size:.82rem;color:var(--g700)}
.savings-banner .s-num{font-size:1.3rem;font-weight:800;color:var(--teal);white-space:nowrap}
.empty-state{text-align:center;padding:50px 20px;color:var(--g500)}
.empty-state .icon{font-size:2.8rem;margin-bottom:12px}
.empty-state h3{font-size:.95rem;font-weight:700;color:var(--g700);margin-bottom:6px}
.empty-state p{font-size:.86rem;max-width:380px;margin:0 auto}
footer{text-align:center;padding:28px 20px;color:var(--g500);font-size:.78rem;border-top:1px solid var(--card-border)}
footer a{color:var(--g500);text-decoration:none}.footer a:hover{color:var(--cyan)}
.hidden{display:none!important}
/* LOCAL MODE BANNER */
.local-banner{background:linear-gradient(135deg,rgba(37,71,244,.25),rgba(37,71,244,.1));color:#fff;border:1px solid rgba(37,71,244,.35);border-radius:12px;padding:16px 22px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 4px 20px rgba(37,71,244,.15)}
.local-banner .lb-icon{font-size:1.8rem;flex-shrink:0}
.local-banner .lb-body{flex:1}
.local-banner .lb-title{font-weight:800;font-size:.95rem;margin-bottom:3px}
.local-banner .lb-meta{font-size:.78rem;opacity:.7;font-family:monospace}
.local-banner .lb-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);border-radius:99px;padding:3px 12px;font-size:.72rem;font-weight:700;white-space:nowrap}
.local-repo-tab{background:var(--card-alt);border:1px solid var(--card-border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:.15s;margin-bottom:8px}
.local-repo-tab:hover{border-color:rgba(37,71,244,.4);background:rgba(37,71,244,.08)}
.local-repo-tab.active{border-color:var(--blue);background:var(--blue-l)}
.local-repo-tab .lrt-name{font-family:monospace;font-weight:700;font-size:.88rem;color:var(--g900)}
.local-repo-tab .lrt-tok{font-size:.76rem;color:var(--g500);font-weight:600}
/* AREA NAV */
.area-nav{display:flex;gap:6px;padding:4px;background:var(--toggle-bg);border:1px solid var(--hero-border);border-radius:12px;overflow:auto;scrollbar-width:none}
.area-nav::-webkit-scrollbar{display:none}
.area-tab{flex:0 0 auto;padding:10px 14px;text-align:center;font-weight:700;font-size:.82rem;cursor:pointer;border:none;background:none;color:var(--toggle-color);transition:.2s;border-radius:8px;font-family:'Space Grotesk',sans-serif;white-space:nowrap}
.area-tab.active{color:#fff;background:var(--toggle-active-bg)}
.area-tab:hover:not(.active){color:#fff;background:rgba(255,255,255,.08)}
/* RESULT HEADER */
.result-overview{display:grid;gap:14px;margin-bottom:18px}
.result-header{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:20px 22px;display:grid;gap:16px}
.rh-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:start}
.rh-title{display:flex;align-items:center;gap:10px;min-width:0;flex-wrap:wrap}
.rh-name{font-size:1.18rem;font-weight:800;color:var(--g900);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rh-support{font-size:.76rem;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.rh-bottom{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:end}
.rh-kpi{display:flex;flex-direction:column;gap:5px}
.rh-kpi-label{font-size:.76rem;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.05em}
.rh-tokens{font-family:monospace;font-size:1.6rem;font-weight:800;color:var(--cyan);white-space:nowrap;line-height:1}
.health-badge{border-radius:99px;padding:3px 12px;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.health-badge.ok{background:var(--green-l);color:var(--green)}
.health-badge.warn{background:var(--yellow-l);color:var(--orange)}
.health-badge.max{background:var(--red-l);color:var(--red)}
.rh-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
/* COVERAGE MATRIX */
.coverage-matrix{background:var(--card);border:1px solid var(--card-border);border-radius:12px;overflow:hidden}
.coverage-matrix-title{padding:12px 18px;background:var(--card-alt);border-bottom:1px solid var(--card-border);font-size:.8rem;font-weight:800;color:var(--g700);text-transform:uppercase;letter-spacing:.05em}
.coverage-table{width:100%;border-collapse:collapse;font-size:.8rem}
.coverage-table th{padding:10px 14px;text-align:center;font-size:.7rem;font-weight:700;color:var(--g500);border-bottom:1px solid var(--card-border);white-space:nowrap;background:var(--card-alt)}
.coverage-table th:first-child{text-align:left;min-width:120px}
.coverage-table td{padding:9px 14px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
.coverage-table td:first-child{text-align:left;font-family:monospace;font-weight:700;font-size:.82rem;color:var(--g900)}
.coverage-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
@media(max-width:760px){
  .result-header{padding:18px}
  .rh-top,.rh-bottom{grid-template-columns:1fr}
  .rh-name{white-space:normal}
  .rh-support{white-space:normal}
  .rh-actions{justify-content:stretch}
  .rh-actions .action-btn{flex:1;min-width:160px}
}
@media(max-width:520px){
  .rh-tokens{font-size:1.3rem}
  .rh-actions .action-btn{width:100%;min-width:0}
}
/* SCENARIO CARDS */
.scenario-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:640px){.scenario-cards{grid-template-columns:1fr}}
.scenario-card{background:var(--card-alt);border:2px solid var(--card-border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:.2s;text-align:center}
.scenario-card:hover{border-color:rgba(37,71,244,.4);background:var(--blue-l)}
.scenario-card.active{border-color:var(--blue);background:var(--blue-l)}
.scenario-name{font-size:.78rem;font-weight:800;color:var(--g700);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.scenario-desc{font-size:.74rem;color:var(--g500);margin-bottom:8px}
.scenario-cost{font-size:1.1rem;font-weight:800;color:var(--blue);line-height:1}
.scenario-cost-label{font-size:.68rem;color:var(--g400);margin-top:2px}
/* SNAPSHOT TIMELINE */
.snapshot-timeline{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:20px 22px}
.snapshot-timeline-title{font-size:.82rem;font-weight:800;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.snapshot-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--g200)}
.snapshot-row:last-child{border-bottom:none}
.snapshot-date{font-size:.76rem;color:var(--g500);white-space:nowrap;min-width:130px}
.snapshot-repo{font-family:monospace;font-weight:700;font-size:.84rem;color:var(--cyan);flex:1}
.snapshot-tok{font-family:monospace;font-size:.84rem;font-weight:700;color:var(--g900);white-space:nowrap}
.snapshot-delta{border-radius:99px;padding:1px 8px;font-size:.7rem;font-weight:700;white-space:nowrap}
.snapshot-delta.up{background:var(--red-l);color:var(--red)}
.snapshot-delta.down{background:var(--green-l);color:var(--green)}
.snapshot-delta.same{background:var(--g200);color:var(--g500)}
/* SCATTER SECTION */
.scatter-section{margin-bottom:18px}
/* ORG AREA CARD */
.org-area-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:24px 28px;margin-top:20px;margin-bottom:16px}
/* COMPARE SECTION */
.compare-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:24px 28px;margin-bottom:20px}
.compare-queue{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.compare-repo-chip{display:flex;align-items:center;justify-content:space-between;background:rgba(37,71,244,.1);border:1px solid rgba(37,71,244,.25);border-radius:8px;padding:10px 14px}
.compare-repo-chip .crep-name{font-family:monospace;font-size:.88rem;font-weight:700;color:var(--cyan)}
.compare-repo-chip .crep-status{font-size:.75rem;color:var(--g500);margin-left:8px}
.crep-right{display:flex;align-items:center;gap:8px}
.remove-chip{background:none;border:none;cursor:pointer;color:var(--g500);font-size:1rem;padding:2px 6px;border-radius:6px;transition:.15s;line-height:1}
.remove-chip:hover{background:var(--red-l);color:var(--red)}
.compare-run-btn{width:100%;padding:14px;background:transparent;color:var(--cyan);border:1px solid rgba(34,211,238,.5);border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;margin-top:18px;font-family:'Space Grotesk',sans-serif;box-shadow:0 0 20px rgba(34,211,238,.12),inset 0 0 20px rgba(34,211,238,.04)}
.compare-run-btn:hover:not(:disabled){border-color:var(--cyan);box-shadow:0 0 30px rgba(34,211,238,.25),inset 0 0 30px rgba(34,211,238,.08);color:#fff}
.compare-run-btn:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}
[data-theme="light"] .compare-run-btn{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 4px 14px rgba(37,71,244,.3)}
[data-theme="light"] .compare-run-btn:hover:not(:disabled){background:var(--blue-d);box-shadow:0 6px 20px rgba(37,71,244,.4);color:#fff}
[data-theme="light"] .compare-run-btn:disabled{box-shadow:none}
.cmp-hint{font-size:.78rem;color:var(--g500);text-align:center;margin-top:10px}
.compare-result-table{width:100%;border-collapse:collapse;font-size:.82rem}
.compare-result-table th{background:var(--card-alt);font-weight:700;text-align:left;padding:10px 12px;border-bottom:1px solid var(--card-border);color:var(--g700)}
.compare-result-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;color:var(--g900)}
.compare-result-table tr:hover td{background:rgba(37,71,244,.07)}
.compare-result-table .num{text-align:right;font-family:monospace;font-weight:600}
/* ── Org Scan Panel ── */
#org-scan-panel{margin-top:16px}
.org-progress-card{background:var(--card);border-radius:12px;padding:18px 22px;border:1px solid var(--card-border)}
.org-progress-bar-wrap{background:var(--g200);border-radius:99px;height:6px;margin:12px 0 8px;overflow:hidden}
.org-progress-bar{height:6px;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .3s;box-shadow:0 0 8px rgba(34,211,238,.4)}
[data-theme="light"] .org-progress-bar{box-shadow:none}
.org-section-header{display:flex;align-items:center;gap:10px;margin:20px 0 10px;flex-wrap:wrap}
.org-section-title{font-size:.92rem;font-weight:800;color:var(--g900)}
.org-badge{background:var(--blue);color:#fff;border-radius:99px;padding:2px 9px;font-size:.7rem;font-weight:800}
.org-badge.gray{background:var(--g400);color:var(--bg)}
.org-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.org-sort-btn{padding:5px 11px;border:1px solid var(--card-border);border-radius:8px;font-size:.76rem;font-weight:700;background:var(--card-alt);color:var(--g700);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.15s}
.org-sort-btn.active{border-color:var(--blue);background:var(--blue-l);color:var(--cyan)}
.org-select-btn{padding:5px 11px;border:1px solid var(--card-border);border-radius:8px;font-size:.76rem;font-weight:700;background:var(--card-alt);color:var(--g700);cursor:pointer;font-family:'Space Grotesk',sans-serif}
.org-table{width:100%;border-collapse:collapse;font-size:.84rem}
.org-table th{text-align:left;padding:8px 10px;font-size:.7rem;font-weight:800;color:var(--g500);text-transform:uppercase;border-bottom:1px solid var(--card-border);white-space:nowrap}
.org-table th.num{text-align:right}
.org-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;color:var(--g900)}
.org-table td.num{text-align:right;font-variant-numeric:tabular-nums}
.org-table tr:last-child td{border-bottom:none}
.org-table tr:hover td{background:rgba(255,255,255,.03)}
.org-repo-name{font-weight:700;color:var(--cyan);text-decoration:none;font-size:.86rem}
.org-repo-name:hover{text-decoration:underline}
.org-repo-desc{font-size:.74rem;color:var(--g400);margin-top:2px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.org-repo-lang{display:inline-block;font-size:.68rem;padding:1px 6px;border-radius:99px;background:rgba(255,255,255,.07);color:var(--g500);font-weight:700;margin-top:3px}
.org-pagination{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}
.org-page-btn{padding:5px 12px;border:1px solid var(--card-border);border-radius:8px;font-size:.8rem;font-weight:700;background:var(--card-alt);color:var(--g700);cursor:pointer;font-family:'Space Grotesk',sans-serif}
.org-page-btn:disabled{opacity:.35;cursor:default}
.org-page-info{font-size:.8rem;color:var(--g500);font-weight:600}
.org-unconfigured-toggle{background:none;border:none;cursor:pointer;font-size:.8rem;font-weight:700;color:var(--g500);padding:0;text-decoration:underline;margin-top:4px;font-family:'Space Grotesk',sans-serif}
.org-unconfigured-list{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.org-unconfigured-chip{background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:8px;padding:4px 10px;font-size:.76rem;color:var(--g500)}
.org-action-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.org-compare-btn{flex:1;min-width:200px;padding:12px 20px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:800;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.2s;box-shadow:0 0 20px rgba(37,71,244,.25)}
.org-compare-btn:hover{box-shadow:0 0 28px rgba(37,71,244,.4)}
.org-compare-btn:disabled{opacity:.35;cursor:default;box-shadow:none}
.org-download-btn{padding:12px 18px;background:var(--card-alt);color:var(--g700);border:1px solid var(--card-border);border-radius:8px;font-size:.86rem;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.15s}
.org-download-btn:hover{border-color:rgba(37,71,244,.4);color:var(--cyan)}
.cmp-progress{font-size:.78rem;color:var(--g500);display:flex;align-items:center;gap:6px}
.cmp-scanning{color:var(--cyan);font-weight:700}
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.action-btn{padding:9px 14px;background:var(--card-alt);border:1px solid var(--card-border);border-radius:8px;font-size:.82rem;font-weight:700;color:var(--g700);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.15s}
.action-btn:hover{border-color:rgba(37,71,244,.4);color:var(--cyan);background:rgba(37,71,244,.08)}
.action-btn.primary{background:linear-gradient(135deg,var(--blue-d),var(--blue));color:#fff;border-color:transparent;box-shadow:0 0 16px rgba(37,71,244,.3)}
.action-btn.primary:hover{box-shadow:0 0 24px rgba(37,71,244,.5);color:#fff}
.workspace-meta{margin-top:10px;font-size:.78rem;color:var(--g500)}
.library-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
@media(max-width:760px){.library-grid{grid-template-columns:1fr}}
.library-group{background:var(--card-alt);border:1px solid var(--card-border);border-radius:10px;padding:14px}
.library-group h4{font-size:.82rem;font-weight:800;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.library-list{display:flex;flex-direction:column;gap:10px}
.library-empty{font-size:.8rem;color:var(--g400)}
.library-item{background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:11px 13px}
.library-file{font-family:monospace;font-size:.82rem;font-weight:700;color:var(--cyan)}
.library-meta{font-size:.74rem;color:var(--g500);margin-top:3px}
.library-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.library-actions button{background:var(--card-alt);border:1px solid var(--card-border);border-radius:6px;padding:6px 10px;font-size:.74rem;font-weight:700;cursor:pointer;color:var(--g700);font-family:'Space Grotesk',sans-serif;transition:.15s}
.library-actions button:hover{border-color:rgba(37,71,244,.4);color:var(--cyan)}
.library-repo-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.library-repo-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;background:var(--card-alt);border-radius:8px;border:1px solid var(--card-border)}
.library-repo-row .repo-name{font-family:monospace;font-weight:700;font-size:.82rem;color:var(--cyan)}
.library-repo-row .repo-meta{font-size:.72rem;color:var(--g500)}
.library-repo-actions{display:flex;gap:8px;flex-wrap:wrap}
.library-repo-actions button{background:var(--card);border:1px solid var(--card-border);border-radius:6px;padding:5px 10px;font-size:.72rem;font-weight:700;cursor:pointer;color:var(--g700);font-family:'Space Grotesk',sans-serif;transition:.15s}
.library-repo-actions button:hover{border-color:rgba(37,71,244,.4);color:var(--cyan)}
.compare-repo-chip.unresolved{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.08)}
.compare-repo-chip .crep-meta{font-size:.72rem;color:var(--g500);margin-top:2px}
.compare-repo-chip .crep-name-wrap{display:flex;flex-direction:column;gap:2px}
.warning-text{background:rgba(245,158,11,.1);border-left:3px solid var(--orange);border-radius:8px;padding:10px 14px;font-size:.8rem;color:#fcd34d;margin-top:12px;display:flex;align-items:flex-start;gap:8px}
.cmp-saved-panel{margin-top:22px}
.cmp-saved-panel h4{font-size:.82rem;font-weight:800;color:var(--g500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.cmp-saved-list{display:flex;flex-direction:column;gap:10px}
.hidden-input{display:none}
/* COPY & TRANSLATE */
.icon-btn{background:none;border:1px solid transparent;border-radius:6px;padding:3px 7px;cursor:pointer;font-size:.8rem;color:var(--g500);transition:.15s;line-height:1;font-family:'Space Grotesk',sans-serif}
.icon-btn:hover{border-color:var(--card-border);background:var(--card-alt);color:var(--g900)}
.icon-btn.copied{color:var(--green)!important}
.translate-panel{border-bottom:1px solid var(--card-border);padding:10px 18px;background:rgba(37,71,244,.05);display:none}
.translate-panel.open{display:block}
.translate-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.translate-controls select{padding:4px 10px;border:1px solid var(--card-border);border-radius:6px;background:var(--card-alt);color:var(--g900);font-size:.8rem;font-family:'Space Grotesk',sans-serif;cursor:pointer;outline:none}
.translate-controls .t-run-btn{padding:4px 14px;border-radius:6px;border:none;background:var(--blue);color:#fff;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.15s}
.translate-controls .t-run-btn:hover{opacity:.85}.translate-controls .t-run-btn:disabled{opacity:.5;cursor:not-allowed}
.translate-controls .t-close-btn{background:none;border:1px solid var(--card-border);border-radius:6px;padding:3px 8px;font-size:.8rem;color:var(--g500);cursor:pointer;transition:.15s}
.translate-controls .t-close-btn:hover{color:var(--g900);border-color:var(--g500)}
.translate-result{margin-top:10px;padding:10px 14px;background:var(--card);border:1px solid var(--card-border);border-radius:8px;font-size:.84rem;color:var(--g700);line-height:1.7;white-space:pre-wrap;word-break:break-word;display:none}
.translate-result.show{display:block}
.translate-status{font-size:.78rem;color:var(--g500);margin-top:6px;font-style:italic;display:none}
.translate-status.show{display:block}
/* API KEYS MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-backdrop.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:28px;width:min(460px,100%);box-shadow:0 24px 60px rgba(0,0,0,.4)}
.modal-box h3{font-size:1rem;font-weight:800;color:var(--g900);margin-bottom:6px}
.modal-sub{font-size:.8rem;color:var(--g500);margin-bottom:20px;line-height:1.6}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:.74rem;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.modal-field input{width:100%;padding:9px 12px;border:1px solid var(--card-border);border-radius:8px;font-size:.84rem;background:var(--card-alt);color:var(--g900);font-family:monospace;outline:none;transition:.2s;box-sizing:border-box}
.modal-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,71,244,.15)}
.modal-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
.modal-actions button{padding:8px 20px;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.15s}
.modal-save-btn{background:var(--blue);color:#fff;border:none}.modal-save-btn:hover{opacity:.85}
.modal-cancel-btn{background:none;border:1px solid var(--card-border);color:var(--g700)}.modal-cancel-btn:hover{border-color:rgba(37,71,244,.4);color:var(--cyan)}
.settings-btn{background:var(--toggle-bg);border:1px solid var(--hero-border);border-radius:8px;padding:6px 10px;font-size:.82rem;cursor:pointer;color:rgba(255,255,255,.65);transition:.15s;line-height:1}
.settings-btn:hover{border-color:rgba(255,255,255,.35);color:#fff}
@media(max-width:980px){
  .hero-inner{grid-template-columns:auto auto;justify-content:space-between}
  .area-nav{grid-column:1/-1;order:3}
  .hero-controls{justify-self:auto}
}
@media(max-width:640px){
  .hero{padding:12px 14px}
  .hero-inner{gap:12px}
  .brand-name{font-size:.92rem}
  .hero-controls{width:100%;justify-content:flex-end;flex-wrap:wrap}
  .lang-toggle{order:3}
}
/* HISTORY */
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.history-header h3{font-size:.95rem;font-weight:800;color:var(--g900)}
.history-refresh-btn{padding:5px 12px;border:1px solid var(--card-border);border-radius:8px;font-size:.78rem;font-weight:700;background:var(--card-alt);color:var(--g700);cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:.15s}
.history-refresh-btn:hover{border-color:rgba(37,71,244,.4);color:var(--cyan)}
.history-item{background:var(--card-alt);border:1px solid var(--card-border);border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;margin-bottom:8px;transition:.15s;cursor:pointer}
.history-item:hover{border-color:rgba(37,71,244,.4);background:rgba(37,71,244,.06)}
.history-item:last-child{margin-bottom:0}
.history-item-body{flex:1;min-width:0}
.history-item-name{font-family:monospace;font-weight:700;font-size:.88rem;color:var(--g900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-item-meta{font-size:.74rem;color:var(--g500);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-item-badge{background:var(--blue-l);color:var(--blue);border:1px solid rgba(37,71,244,.2);border-radius:99px;padding:2px 9px;font-size:.72rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.history-delete-btn{background:none;border:1px solid transparent;border-radius:6px;padding:5px 8px;cursor:pointer;font-size:.85rem;color:var(--g400);transition:.15s;flex-shrink:0;line-height:1}
.history-delete-btn:hover{background:var(--red-l);border-color:rgba(239,68,68,.25);color:var(--red)}
.history-loading-item{display:flex;align-items:center;gap:10px;padding:12px 14px;color:var(--g500);font-size:.88rem}
.server-status-pill{display:flex;align-items:center;gap:5px;font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap;transition:.3s}
.server-status-pill.online{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.server-status-pill.offline{background:rgba(255,255,255,.05);color:var(--g500);border:1px solid rgba(255,255,255,.08)}
.server-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.server-status-pill.online .server-status-dot{background:var(--green);box-shadow:0 0 5px var(--green)}
.server-status-pill.offline .server-status-dot{background:var(--g400)}
[data-theme="light"] .server-status-pill.online .server-status-dot{box-shadow:none}
/* FULLSCREEN MODAL */
.fullscreen-modal{position:fixed;inset:0;z-index:900;background:var(--bg);display:none;flex-direction:column;animation:fs-in .15s ease}
.fullscreen-modal.open{display:flex}
@keyframes fs-in{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
.fs-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 20px;background:var(--card);border-bottom:1px solid var(--card-border);flex-shrink:0}
.fs-title{display:flex;align-items:center;gap:8px;font-family:monospace;font-weight:700;font-size:.9rem;color:var(--cyan);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fs-title-icon{font-size:1.1rem;flex-shrink:0}
.fs-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.fs-tabs{display:flex;background:var(--card-alt);border:1px solid var(--card-border);border-radius:8px;overflow:hidden}
.fs-tab-btn{padding:5px 14px;border:none;background:none;cursor:pointer;font-size:.8rem;font-weight:600;color:var(--g500);transition:.15s;font-family:'Space Grotesk',sans-serif}
.fs-tab-btn.active{background:var(--blue);color:#fff}
.fs-body{flex:1;overflow-y:auto;padding:32px 40px}
.fs-body .md-body{max-width:780px;margin:0 auto}
.fs-body .raw-code{max-height:none;border-radius:10px}
@media(max-width:640px){.fs-body{padding:20px 16px}}
</style>
</head>
<body>

<!-- FULLSCREEN MODAL -->
<div class="fullscreen-modal" id="fullscreen-modal">
  <div class="fs-header">
    <div class="fs-title"><span class="fs-title-icon" id="fs-icon"></span><span id="fs-path"></span></div>
    <div class="fs-actions">
      <div class="fs-tabs">
        <button class="fs-tab-btn active" id="fs-tab-rendered" onclick="switchFsTab('rendered')"></button>
        <button class="fs-tab-btn" id="fs-tab-raw" onclick="switchFsTab('raw')"></button>
      </div>
      <button class="icon-btn" id="fs-copy-btn" onclick="copyFsContent()">📋</button>
      <button class="icon-btn" id="fs-close-btn" onclick="closeFullscreen()" style="font-size:.9rem;padding:4px 9px">✕</button>
    </div>
  </div>
  <div class="fs-body">
    <div id="fs-rendered"></div>
    <div id="fs-raw" style="display:none"></div>
  </div>
</div>

<!-- API KEYS MODAL -->
<div class="modal-backdrop" id="api-keys-modal" onclick="if(event.target===this)closeApiKeysModal()">
  <div class="modal-box">
    <h3 id="ak-title"></h3>
    <p class="modal-sub" id="ak-desc"></p>
    <div class="modal-field"><label id="ak-lbl-anthropic">Anthropic (Claude)</label><input id="ak-anthropic" type="password" placeholder="sk-ant-..." autocomplete="off" /></div>
    <div class="modal-field"><label id="ak-lbl-openai">OpenAI (GPT)</label><input id="ak-openai" type="password" placeholder="sk-..." autocomplete="off" /></div>
    <div class="modal-field"><label id="ak-lbl-gemini">Google Gemini</label><input id="ak-gemini" type="password" placeholder="AIza..." autocomplete="off" /></div>
    <div class="modal-actions">
      <button class="modal-cancel-btn" id="ak-cancel-btn" onclick="closeApiKeysModal()"></button>
      <button class="modal-save-btn" id="ak-save-btn" onclick="saveApiKeys()"></button>
    </div>
  </div>
</div>

<div class="hero">
  <div class="hero-inner">
    <div class="brand-lockup">
      <div class="brand-mark"></div>
      <div class="brand-name">AgentLens</div>
    </div>
    <div class="area-nav">
      <button class="area-tab active" onclick="setArea('analyze')" id="area-tab-analyze"></button>
      <button class="area-tab" onclick="setArea('compare')" id="area-tab-compare"></button>
      <button class="area-tab" onclick="setArea('org')" id="area-tab-org"></button>
      <button class="area-tab" onclick="setArea('reports')" id="area-tab-reports"></button>
      <button class="area-tab" onclick="setArea('history')" id="area-tab-history"></button>
    </div>
    <div class="hero-controls">
      <button class="settings-btn" onclick="showApiKeysModal()" title="API Keys">🔑</button>
      <div class="lang-toggle">
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn active" onclick="setLang('pt')">PT</button>
      </div>
      <button class="theme-toggle-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <span id="server-status"></span>
    </div>
  </div>
  <p id="hero-sub" class="hero-sub"></p>
</div>

<div class="container" style="padding-top:18px;padding-bottom:24px">
  <!-- LOCAL MODE BANNER (shown when opened from CLI) -->
  <div id="local-banner" class="local-banner hidden" style="margin-top:20px"></div>

  <!-- ANALYZE AREA -->
  <div id="area-analyze">
  <div class="input-section">
    <label class="input-label" for="repo-url" id="lbl-repo"></label>
    <div class="input-row">
      <input class="repo-input" id="repo-url" type="text" autocomplete="off" spellcheck="false" />
      <button class="fetch-btn" id="fetch-btn" onclick="analyze()">
        <span id="btn-icon">🔍</span>
        <span id="btn-text"></span>
      </button>
    </div>
    <div class="examples">
      <span>Try:</span>
      <span class="example-chip" onclick="setExample('https://github.com/anthropics/anthropic-cookbook')">anthropic-cookbook</span>
      <span class="example-chip" onclick="setExample('https://github.com/openai/codex')">openai/codex</span>
      <span class="example-chip" onclick="setExample('https://github.com/microsoft/vscode')">microsoft/vscode</span>
      <span class="example-chip" onclick="setExample('https://github.com/withastro/astro')">withastro/astro</span>
      <span class="example-chip" onclick="setExample('https://github.com/getsentry/sentry')">getsentry/sentry</span>
      <span class="example-chip" onclick="setExample('https://github.com/facebook/react')">facebook/react</span>
      <span class="example-chip" onclick="setExample('https://github.com/grafana/grafana')">grafana/grafana</span>
    </div>
  </div>

  <div id="status-area"></div>

  <div id="results" class="hidden">
    <div class="result-overview">
      <div id="result-header" class="hidden"></div>
      <div id="coverage-matrix" class="coverage-matrix hidden"></div>
    </div>
    <!-- MAIN TABS -->
    <div class="main-tabs">
      <button class="main-tab active" onclick="showPanel('panel-detect',this)" id="tab-detect"></button>
      <button class="main-tab" onclick="showPanel('panel-cost',this)" id="tab-cost"></button>
    </div>

    <!-- DETECTION PANEL -->
    <div class="tab-panel active" id="panel-detect">
      <div class="stats-bar" id="stats-bar"></div>
      <div id="savings-banner" class="savings-banner hidden"></div>
      <!-- CONTEXT HEALTH -->
      <div class="section" id="health-section"></div>

      <div class="section">
        <div class="section-header"><h2 id="h-tools"></h2><span class="pill green" id="tools-found-pill"></span></div>
        <div class="tool-grid" id="tool-grid"></div>
      </div>
      <div class="section">
        <div class="section-header"><h2 id="h-tree"></h2><span class="pill" id="tree-count-pill"></span></div>
        <div class="context-tree" id="context-tree"></div>
      </div>
      <div class="section">
        <div class="section-header"><h2 id="h-files"></h2><span class="pill" id="agent-files-pill"></span></div>
        <div id="agent-files-list"></div>
      </div>
      <div class="section">
        <div class="section-header"><h2 id="h-refs"></h2><span class="pill green" id="refs-count-pill"></span></div>
        <div class="refs-grid" id="refs-grid"></div>
      </div>
    </div>

    <!-- COST PANEL -->
    <div class="tab-panel" id="panel-cost">

      <!-- Scenario Cards -->
      <div class="scenario-cards" id="scenario-cards" style="margin-bottom:18px">
        <div class="scenario-card" id="sc-solo" onclick="applyScenario(1,10,this)">
          <div class="scenario-name" id="sc-solo-name"></div>
          <div class="scenario-desc" id="sc-solo-desc"></div>
          <div class="scenario-cost" id="sc-solo-cost">—</div>
          <div class="scenario-cost-label" id="sc-solo-lbl"></div>
        </div>
        <div class="scenario-card active" id="sc-team" onclick="applyScenario(5,15,this)">
          <div class="scenario-name" id="sc-team-name"></div>
          <div class="scenario-desc" id="sc-team-desc"></div>
          <div class="scenario-cost" id="sc-team-cost">—</div>
          <div class="scenario-cost-label" id="sc-team-lbl"></div>
        </div>
        <div class="scenario-card" id="sc-large" onclick="applyScenario(20,30,this)">
          <div class="scenario-name" id="sc-large-name"></div>
          <div class="scenario-desc" id="sc-large-desc"></div>
          <div class="scenario-cost" id="sc-large-cost">—</div>
          <div class="scenario-cost-label" id="sc-large-lbl"></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="cost-section">
        <h3 id="h-cost-controls"></h3>
        <div class="controls-grid">
          <div class="control-group">
            <label id="lbl-model"></label>
            <select id="sel-model" onchange="recalcCost()">
              <optgroup label="Anthropic">
                <option value="claude-opus-4.6">Claude Opus 4.6</option>
                <option value="claude-sonnet-4.6" selected>Claude Sonnet 4.6</option>
                <option value="claude-sonnet-4.5">Claude Sonnet 4.5</option>
                <option value="claude-haiku-4.5">Claude Haiku 4.5</option>
              </optgroup>
              <optgroup label="OpenAI">
                <option value="gpt-5.4">GPT-5.4</option>
                <option value="gpt-5.3-codex">GPT-5.3 Codex</option>
              </optgroup>
              <optgroup label="Cursor">
                <option value="cursor-composer-2">Composer 2</option>
                <option value="cursor-composer-2-fast">Composer 2 Fast</option>
                <option value="cursor-composer-1.5">Composer 1.5</option>
                <option value="cursor-auto">Cursor Auto</option>
              </optgroup>
              <optgroup label="Google">
                <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
              </optgroup>
              <optgroup label="DeepSeek">
                <option value="deepseek-v3">DeepSeek V3</option>
                <option value="deepseek-r1">DeepSeek R1</option>
              </optgroup>
              <optgroup label="Moonshot">
                <option value="kimi-k2">Kimi K2</option>
              </optgroup>
              <optgroup label="Alibaba">
                <option value="qwen3-max">Qwen3 Max</option>
                <option value="qwen3.5-plus">Qwen3.5 Plus</option>
              </optgroup>
              <optgroup label="xAI">
                <option value="grok-3">Grok 3</option>
              </optgroup>
              <optgroup label="Mistral">
                <option value="mistral-large">Mistral Large</option>
                <option value="mistral-medium-3">Mistral Medium 3</option>
              </optgroup>
            </select>
          </div>
          <div class="control-group">
            <label id="lbl-output"></label>
            <select id="sel-output" onchange="recalcCost()">
              <option value="2000">2k tokens (~short answer)</option>
              <option value="4000" selected>4k tokens (~medium)</option>
              <option value="8000">8k tokens (~code gen)</option>
              <option value="16000">16k tokens (~long gen)</option>
            </select>
          </div>
        </div>
        <div class="slider-group">
          <label id="lbl-devs"><span class="val" id="val-devs">5</span></label>
          <input type="range" id="sl-devs" min="1" max="100" value="5" oninput="recalcCost()">
        </div>
        <div class="slider-group">
          <label id="lbl-chats"><span class="val" id="val-chats">15</span></label>
          <input type="range" id="sl-chats" min="1" max="100" value="15" oninput="recalcCost()">
        </div>
        <div class="slider-group">
          <label id="lbl-cache"><span class="val" id="val-cache">70%</span></label>
          <input type="range" id="sl-cache" min="0" max="100" value="70" oninput="recalcCost()">
        </div>
        <div class="toggle-row">
          <label class="toggle"><input type="checkbox" id="chk-brl" onchange="recalcCost()" checked><span class="slider"></span></label>
          <label for="chk-brl" id="lbl-brl"></label>
        </div>
      </div>

      <!-- KPIs -->
      <div class="kpi-row" id="kpi-row"></div>

      <!-- Charts -->
      <div class="cost-section">
        <h3 id="h-breakdown"></h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="chart-box" style="height:260px"><canvas id="chart-breakdown"></canvas></div>
          <div class="chart-box" style="height:260px"><canvas id="chart-perdev"></canvas></div>
        </div>
      </div>

      <!-- Comparison Table -->
      <div class="cost-section">
        <h3 id="h-comparison"></h3>
        <div style="overflow-x:auto">
          <table class="comparison-table" id="comparison-table"></table>
        </div>
      </div>

    </div>
  </div>

  <div id="empty-state" class="empty-state">
    <div class="icon">🗂️</div>
    <h3 id="empty-h"></h3>
    <p id="empty-p"></p>
  </div>
  </div><!-- end #area-analyze -->

  <!-- COMPARE AREA -->
  <div id="area-compare" class="hidden">
    <div class="compare-card" style="margin-top:20px">
      <div class="examples" style="margin-bottom:14px">
        <span>Try:</span>
        <span class="example-chip" onclick="addExampleToCompare('https://github.com/anthropics/anthropic-cookbook')">anthropic-cookbook</span>
        <span class="example-chip" onclick="addExampleToCompare('https://github.com/openai/codex')">openai/codex</span>
        <span class="example-chip" onclick="addExampleToCompare('https://github.com/microsoft/vscode')">microsoft/vscode</span>
        <span class="example-chip" onclick="addExampleToCompare('https://github.com/withastro/astro')">withastro/astro</span>
        <span class="example-chip" onclick="addExampleToCompare('https://github.com/getsentry/sentry')">getsentry/sentry</span>
        <span class="example-chip" onclick="addExampleToCompare('https://github.com/facebook/react')">facebook/react</span>
        <span class="example-chip" onclick="addExampleToCompare('https://github.com/grafana/grafana')">grafana/grafana</span>
      </div>
      <label class="input-label" id="lbl-cmp-add"></label>
      <div class="input-row">
        <input class="repo-input" id="cmp-url" type="text" autocomplete="off" spellcheck="false" />
        <button class="fetch-btn" onclick="addToCompare()">
          <span>＋</span>
          <span id="btn-cmp-add"></span>
        </button>
      </div>
      <div class="compare-queue" id="cmp-queue"></div>
      <p class="cmp-hint" id="cmp-hint"></p>
      <div class="action-row">
        <button class="action-btn" id="btn-import-report-compare" onclick="triggerReportImport()"></button>
        <button class="action-btn" id="btn-import-comparison-compare" onclick="triggerComparisonImport()"></button>
        <button class="action-btn" id="btn-export-comparison-compare" onclick="exportComparison()"></button>
      </div>
      <button class="compare-run-btn" id="cmp-run-btn" onclick="runCompare()" disabled>
        <span id="cmp-run-icon">⚖️</span>
        <span id="cmp-run-text"></span>
      </button>
    </div>

    <!-- Compare status -->
    <div id="cmp-status-area"></div>

    <!-- Compare results -->
    <div id="cmp-results" class="hidden">
      <!-- Scatter plot -->
      <div class="cost-section scatter-section" id="scatter-section" style="display:none">
        <h3 id="h-scatter-chart"></h3>
        <div class="chart-box" style="height:260px"><canvas id="chart-compare-scatter"></canvas></div>
      </div>
      <!-- Context bar chart -->
      <div class="cost-section">
        <h3 id="h-cmp-chart"></h3>
        <div class="chart-box" style="height:300px"><canvas id="chart-compare"></canvas></div>
      </div>
      <!-- Comparison table -->
      <div class="cost-section">
        <h3 id="h-cmp-table"></h3>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:var(--card-alt);border:1px solid var(--card-border);border-radius:10px">
          <label style="font-size:.75rem;font-weight:700;color:var(--g500);text-transform:uppercase" id="lbl-cmp-model"></label>
          <select id="cmp-sel-model" onchange="renderCompareResults()" style="padding:6px 10px;border:1px solid var(--card-border);border-radius:8px;font-size:.88rem;background:var(--card-alt);color:var(--g900);font-family:'Space Grotesk',sans-serif;outline:none">
            <optgroup label="Anthropic">
              <option value="claude-opus-4.6">Claude Opus 4.6</option>
              <option value="claude-sonnet-4.6" selected>Claude Sonnet 4.6</option>
              <option value="claude-sonnet-4.5">Claude Sonnet 4.5</option>
              <option value="claude-haiku-4.5">Claude Haiku 4.5</option>
            </optgroup>
            <optgroup label="OpenAI">
              <option value="gpt-5.4">GPT-5.4</option>
              <option value="gpt-5.3-codex">GPT-5.3 Codex</option>
            </optgroup>
            <optgroup label="Cursor">
              <option value="cursor-composer-2">Composer 2</option>
              <option value="cursor-composer-2-fast">Composer 2 Fast</option>
              <option value="cursor-auto">Cursor Auto</option>
            </optgroup>
            <optgroup label="Google">
              <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
              <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            </optgroup>
            <optgroup label="DeepSeek">
              <option value="deepseek-v3">DeepSeek V3</option>
              <option value="deepseek-r1">DeepSeek R1</option>
            </optgroup>
            <optgroup label="Moonshot"><option value="kimi-k2">Kimi K2</option></optgroup>
            <optgroup label="Alibaba">
              <option value="qwen3-max">Qwen3 Max</option>
              <option value="qwen3.5-plus">Qwen3.5 Plus</option>
            </optgroup>
            <optgroup label="xAI"><option value="grok-3">Grok 3</option></optgroup>
            <optgroup label="Mistral">
              <option value="mistral-large">Mistral Large 3</option>
              <option value="mistral-medium-3">Mistral Medium 3</option>
            </optgroup>
          </select>
          <label style="font-size:.75rem;font-weight:700;color:var(--g500);text-transform:uppercase" id="lbl-cmp-devs"></label>
          <input type="range" id="cmp-sl-devs" min="1" max="100" value="5" oninput="renderCompareResults()" style="width:120px;accent-color:var(--blue)">
          <span id="cmp-val-devs" style="font-size:.9rem;font-weight:700;color:var(--blue);min-width:24px">5</span>
          <label style="font-size:.75rem;font-weight:700;color:var(--g500);text-transform:uppercase" id="lbl-cmp-chats"></label>
          <input type="range" id="cmp-sl-chats" min="1" max="100" value="15" oninput="renderCompareResults()" style="width:120px;accent-color:var(--blue)">

        </div>

function resolveRefPath(basePath,refPath){const raw=normalizeRefPath(refPath);if(!raw)return'';if(!raw.startsWith('.'))return raw;const parts=normalizeRefPath(basePath).split('/').filter(Boolean);if(parts.length)parts.pop();for(const part of raw.split('/')){if(!part||part==='.'){continue}if(part==='..'){if(parts.length)parts.pop();continue}parts.push(part)}return parts.join('/')}
function isLikelyInlineRef(p){return !!p&&p.length<120&&!/\s/.test(p)&&!p.startsWith('http')&&(p.includes('/')||/\.(md|mdx|txt|json|ya?ml|toml|ini|cfg|conf|xml|html|css|js|cjs|mjs|ts|tsx|jsx|py|rb|go|rs|java|c|cpp|h|hpp|sh)$/i.test(p))}

function calcAllContextTokens(foundByTool,uniqueRefs){const seen=new Set();let total=0;for(const file of Object.values(foundByTool||{})){const path=normalizeRefPath(file&&file.path);if(!path||seen.has(path))continue;seen.add(path);total+=estimateTokens(file.content||'')}for(const ref of uniqueRefs||[]){const path=normalizeRefPath(ref&&ref.path);if(!ref.found||!path||seen.has(path))continue;seen.add(path);total+=ref.tokens||0}return total}

// Reference parser
function parseReferences(content){
  const found=new Map();
  for(const line of content.split('\n')){
    const t=line.trim();
    let m=t.match(/^@import\s+["']?([^\s"']+)["']?/);
    if(m){addR(found,m[1],'import');continue}
    m=t.match(/^[!]?include[:\s]+["']?([^\s"']+\.[a-zA-Z0-9]+)["']?/i);
    if(m){addR(found,m[1],'include');continue}
    m=t.match(/^@(?:file\s+)?([^\s@#]+\.[a-zA-Z0-9]+)/);
    if(m&&!m[1].startsWith('http')){addR(found,m[1],'ref');continue}
    const lr=/\[([^\]]*)\]\(([^)]+)\)/g;let lm;
    while((lm=lr.exec(line))!==null){const h=lm[2].split('#')[0].trim();if(h&&!h.startsWith('http')&&!h.startsWith('mailto')&&h.includes('.'))addR(found,h,'link')}
    m=t.match(/^context[_-]?files?:\s*\[([^\]]+)\]/i);
    if(m){m[1].split(',').forEach(f=>{const p=f.trim().replace(/["']/g,'');if(p)addR(found,p,'context')});continue}
    const cr=/`([^`]+\.[a-zA-Z0-9]+)`/g;let cm;
    while((cm=cr.exec(line))!==null){const p=cm[1];if(isLikelyInlineRef(p))addR(found,p,'inline-code')}
  }
  return Array.from(found.values());
}
function addR(map,raw,type){const p=raw.replace(/^\.\//,'').replace(/^\//,'');if(!p||p.startsWith('http')||p.length>200)return;if(!map.has(p))map.set(p,{path:p,type})}

// Markdown renderer
function renderMd(md){let h=md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`).replace(/^#{4}\s(.+)$/gm,'<h4>$1</h4>').replace(/^#{3}\s(.+)$/gm,'<h3>$1</h3>').replace(/^#{2}\s(.+)$/gm,'<h2>$1</h2>').replace(/^#{1}\s(.+)$/gm,'<h1>$1</h1>').replace(/^---+$/gm,'<hr>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/^&gt;\s(.+)$/gm,'<blockquote>$1</blockquote>').replace(/^[-*+]\s(.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/gs,m=>`<ul>${m}</ul>`).replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');return`<p>${h}</p>`}

async function analyzeRepoData(owner,repo){
  const branches=['main','master','develop','trunk'];
  let usedBranch=null;
  for(const b of branches){
    try{
      const r=await fetch(rawUrl(owner,repo,b,'README.md'),{method:'HEAD'});
      if(r.ok){usedBranch=b;break}
      if(r.status===403)return{ok:false,error:'private'}
    }catch(e){}
  }
  if(!usedBranch){
    for(const b of branches){
      try{
        for(const f of ['AGENTS.md','CLAUDE.md','LICENSE']){
          const r=await fetch(rawUrl(owner,repo,b,f),{method:'HEAD'});
          if(r.ok){usedBranch=b;break}
        }
        if(usedBranch)break
      }catch(e){return{ok:false,error:'network'}}
    }
  }
  if(!usedBranch)return{ok:false,error:'notfound'}

  const fetchF=async p=>{try{const r=await fetch(rawUrl(owner,repo,usedBranch,p));if(r.ok)return{path:p,content:await r.text(),found:true}}catch(e){}return{path:p,content:null,found:false}};

  const all=[];AGENT_TOOLS.forEach(t=>t.files.forEach(f=>all.push({toolId:t.id,filePath:f})));
  const res=await Promise.all(all.map(async({toolId,filePath})=>{const r=await fetchF(filePath);return{toolId,...r}}));

  const foundByTool={};
  for(const r of res)if(r.found&&!foundByTool[r.toolId])foundByTool[r.toolId]={path:r.path,content:r.content};

  const foundTools=AGENT_TOOLS.filter(t=>foundByTool[t.id]);
  if(!foundTools.length)return{ok:true,branch:usedBranch,foundByTool:{},uniqueRefs:[],agentTok:0,refTok:0,totalContextTokens:0,noFiles:true};

  const refPool=new Map();
  const parsedCache=new Map();
  const queue=[];
  function enqueue(toolId,basePath,ref){
    const resolvedPath=resolveRefPath(basePath,ref.path);
    if(!resolvedPath)return;
    if(!refPool.has(resolvedPath)){
      refPool.set(resolvedPath,{path:resolvedPath,type:ref.type,fromTools:new Set([toolId]),found:false,content:null,tokens:0});
      queue.push({toolId,path:resolvedPath});
      return;
    }
    const existing=refPool.get(resolvedPath);
    if(!existing.fromTools.has(toolId)){
      existing.fromTools.add(toolId);
      queue.push({toolId,path:resolvedPath});
    }
  }
  for(const tool of foundTools){
    const file=foundByTool[tool.id];
    for(const ref of parseReferences(file.content))enqueue(tool.id,file.path,ref);
  }
  while(queue.length){
    const current=queue.shift();
    const entry=refPool.get(current.path);
    if(!entry)continue;
    if(!entry.found&&entry.content==null){
      try{
        const r=await fetch(rawUrl(owner,repo,usedBranch,entry.path));
        if(r.ok){
          entry.content=await r.text();
          entry.found=true;
          entry.tokens=estimateTokens(entry.content);
        }else{
          entry.content=null;
          entry.found=false;
          entry.tokens=0;
        }
      }catch(e){
        entry.content=null;
        entry.found=false;
        entry.tokens=0;
      }
    }
    if(!entry.found||!entry.content)continue;
    if(!parsedCache.has(entry.path))parsedCache.set(entry.path,parseReferences(entry.content));
    for(const ref of parsedCache.get(entry.path))enqueue(current.toolId,entry.path,ref);
  }
  const uniqueRefs=Array.from(refPool.values());

  const agentTok=foundTools.reduce((s,t)=>s+estimateTokens(foundByTool[t.id].content),0);
  const refTok=calcRefTok(uniqueRefs);
  const viewTokensByTool=calcToolViewTokens(foundByTool,uniqueRefs);
  const allContextTokens=calcAllContextTokens(foundByTool,uniqueRefs);
  return{ok:true,branch:usedBranch,foundByTool,uniqueRefs,agentTok,refTok,viewTokensByTool,allContextTokens,totalContextTokens:calcMaxToolViewTokens(foundByTool,uniqueRefs)}
}

async function analyze(){
  const url=document.getElementById('repo-url').value.trim();
  if(!url){showStatus(`⚠️ ${T('errEnterUrl')}`,'warn');return}
  const parsed=parseRepoUrl(url);
  if(!parsed){showStatus(`❌ ${T('errInvalidUrl')}`,'error');return}
  const{owner,repo}=parsed;
  const btn=document.getElementById('fetch-btn');
  btn.disabled=true;document.getElementById('btn-icon').textContent='⏳';document.getElementById('btn-text').textContent='…';
  document.getElementById('results').classList.add('hidden');document.getElementById('empty-state').classList.add('hidden');
  showStatus(`${T('scanning')} …`,'loading');

  const data=await analyzeRepoData(owner,repo);

  const resetBtn=()=>{btn.disabled=false;document.getElementById('btn-icon').textContent='🔍';document.getElementById('btn-text').textContent=T('btnAnalyze');document.getElementById('empty-state').classList.remove('hidden')};

  if(!data.ok){
    if(data.error==='network')showStatus(`🌐 ${T('errNetwork')}`,'error');
    else showStatus(`🔒 ${T('errPrivate')}<br><span style="font-weight:400;font-size:.84rem;color:var(--g500)">${T('errPrivateDetail')}</span>`,'error');
    resetBtn();return
  }
  if(data.noFiles){showStatus(T('noFiles'),'warn');resetBtn();return}

  STATE.analyzed=true;STATE.totalContextTokens=data.totalContextTokens;STATE.foundByTool=data.foundByTool;STATE.uniqueRefs=data.uniqueRefs;

  clearStatus();
  renderDetection(data.foundByTool,data.uniqueRefs,data.branch);
  renderDetectionExtras(`${parsed.owner}/${parsed.repo}`,data.foundByTool,data.totalContextTokens||data.agentTok+data.refTok||0);
  document.getElementById('results').classList.remove('hidden');
  document.getElementById('empty-state').classList.add('hidden');
  recalcCost();
  btn.disabled=false;document.getElementById('btn-icon').textContent='🔍';document.getElementById('btn-text').textContent=T('btnAnalyze');
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
  saveGithubAnalysis(`${owner}/${repo}`,repo,data);
}

function registerReportDoc(report, source){
  const existingIndex=LOCAL_STATE.reports.findIndex(x=>x.fileName===report.fileName);
  const entry={ fileName:report.fileName, report, source, baselinesQueued:false };
  if(existingIndex>=0){
    const prev=LOCAL_STATE.reports[existingIndex];
    entry.baselinesQueued=prev.baselinesQueued;
    LOCAL_STATE.reports.splice(existingIndex,1,entry);
  }else{
    LOCAL_STATE.reports.push(entry);
    LOCAL_STATE.reports.sort(byFileName);
  }
  return LOCAL_STATE.reports.find(x=>x.fileName===report.fileName)||entry;
}
function registerComparisonDoc(comparison, source){
  const existingIndex=LOCAL_STATE.comparisons.findIndex(x=>x.fileName===comparison.fileName);
  const entry={ fileName:comparison.fileName, comparison, source };
  if(existingIndex>=0)LOCAL_STATE.comparisons.splice(existingIndex,1,entry);
  else{
    LOCAL_STATE.comparisons.push(entry);
    LOCAL_STATE.comparisons.sort(byFileName);
  }
  renderSavedComparisons();
  return LOCAL_STATE.comparisons.find(x=>x.fileName===comparison.fileName)||entry;
}
function ensureBaselinesQueued(reportEntry){
  if(!reportEntry||reportEntry.baselinesQueued)return;
  (reportEntry.report.baselines||[]).forEach(key=>{
    const parsed=parseRepoUrl(`https://github.com/${key}`);
    if(parsed)addCompareItem({ type:'github-repo', key, owner:parsed.owner, repo:parsed.repo }, { silent:true });
  });
  reportEntry.baselinesQueued=true;
}
function setCurrentLocalRepo(fileName, repoId){
  const entry=findReportEntry(fileName);
  if(!entry)return;
  const repo=entry.report.repos.find(r=>r.repoId===repoId)||entry.report.repos[0];
  if(!repo)return;
  LOCAL_STATE.currentFileName=entry.fileName;
  LOCAL_STATE.currentRepoId=repo.repoId;
  ensureBaselinesQueued(entry);
  STATE.analyzed=true;
  STATE.totalContextTokens=repo.totalContextTokens||0;
  STATE.foundByTool=repo.foundByTool||{};
  STATE.uniqueRefs=repo.uniqueRefs||[];
  clearStatus();
  renderDetection(repo.foundByTool||{}, repo.uniqueRefs||[], repo.repoName||entry.fileName);
  renderDetectionExtras(repo.repoName||entry.fileName, repo.foundByTool||{}, repo.totalContextTokens||0);
  document.getElementById('results').classList.remove('hidden');
  document.getElementById('empty-state').classList.add('hidden');
  recalcCost();
  renderLocalBanner();
  renderLocalWorkspace();
}
function resolveCompareItem(item){
  if(item.type==='github-repo')return{ ok:true, kind:'github-repo', item };
  const entry=findReportEntry(item.file);
  if(!entry)return{ ok:false, error:'missing-file', item };
  const repo=entry.report.repos.find(r=>r.repoId===item.repoId);
  if(!repo)return{ ok:false, error:'missing-repo', item, entry };
  return{ ok:true, kind:'report-repo', item, entry, repo };
}

function addLocalRepoToCompare(reportIndex, repoIndex){

function loadSavedComparison(index){

async function ingestFolderJsonFiles(files, folderName){
  LOCAL_STATE.folderName=folderName||LOCAL_STATE.folderName;
  LOCAL_STATE.reports=LOCAL_STATE.reports.filter(x=>x.source!=='folder');
  LOCAL_STATE.comparisons=LOCAL_STATE.comparisons.filter(x=>x.source!=='folder');
  const docs=await Promise.all(files.map(async ({fileName,file})=>{
    try{
      const json=await readJsonFile(file);
      return { fileName, json };
    }catch(e){ return null }
  }));
  docs.filter(Boolean).forEach(({fileName,json})=>{
    const report=normalizeReportDoc(json,fileName);
    if(report){registerReportDoc(report,'folder');return}
    const comparison=normalizeComparisonDoc(json,fileName);
    if(comparison)registerComparisonDoc(comparison,'folder');
  });
  if(LOCAL_STATE.bootstrap&&LOCAL_STATE.bootstrap.defaultReportFile&&findReportEntry(LOCAL_STATE.bootstrap.defaultReportFile)){
    const entry=findReportEntry(LOCAL_STATE.bootstrap.defaultReportFile);
    setCurrentLocalRepo(entry.fileName, LOCAL_STATE.currentRepoId||entry.report.repos[0]&&entry.report.repos[0].repoId);
  }else if(!currentReportEntry()&&LOCAL_STATE.reports[0]&&LOCAL_STATE.reports[0].report.repos[0]){
    setCurrentLocalRepo(LOCAL_STATE.reports[0].fileName, LOCAL_STATE.reports[0].report.repos[0].repoId);
  }
  setLocalWarning('');
  renderLocalWorkspace();
  renderCmpQueue();
  renderSavedComparisons();
}
async function openReportFolder(){
  try{
    if(window.showDirectoryPicker){
      const handle=await window.showDirectoryPicker();
      const files=[];
      for await(const [name,entry] of handle.entries()){
        if(entry.kind==='file'&&name.toLowerCase().endsWith('.json'))files.push({ fileName:name, file:await entry.getFile() });
      }
      await ingestFolderJsonFiles(files, handle.name||'folder');
      return;
    }
  }catch(err){
    if(err&&err.name==='AbortError')return;
  }
  document.getElementById('folder-input').click();
}
async function handleFolderSelection(event){
  const files=Array.from(event.target.files||[]).filter(f=>f.name.toLowerCase().endsWith('.json')&&isTopLevelRelativePath(f.webkitRelativePath));
  const folderName=files[0]&&files[0].webkitRelativePath.split('/')[0]||'folder';
  await ingestFolderJsonFiles(files.map(file=>({ fileName:file.name, file })), folderName);
  event.target.value='';
}
function triggerReportImport(){document.getElementById('report-input').click()}
function triggerComparisonImport(){document.getElementById('comparison-input').click()}
async function handleReportImport(event){
  const files=Array.from(event.target.files||[]);
  let firstImported=null;
  for(const file of files){
    try{
      const report=normalizeReportDoc(await readJsonFile(file), file.name);
      if(!report){setLocalWarning(T('invalidReportJson'));continue}
      registerReportDoc(report,'import');
      if(!firstImported)firstImported=report;
    }catch(e){setLocalWarning(T('invalidReportJson'))}
  }
  if(firstImported&&!currentReportEntry()&&firstImported.repos[0])setCurrentLocalRepo(firstImported.fileName, firstImported.repos[0].repoId);
  renderLocalWorkspace();
  renderCmpQueue();
  event.target.value='';
}
async function handleComparisonImport(event){
  const file=event.target.files&&event.target.files[0];
  if(!file)return;
  try{
    const comparison=normalizeComparisonDoc(await readJsonFile(file), file.name);
    if(!comparison){setLocalWarning(T('invalidComparisonJson'));event.target.value='';return}
    registerComparisonDoc(comparison,'import');
    loadComparisonDocument(comparison);
  }catch(e){setLocalWarning(T('invalidComparisonJson'))}
  event.target.value='';
}
async function loadBootstrapReport(){
  LOCAL_STATE.bootstrap=readBootstrapConfig();
  if(LOCAL_STATE.bootstrap&&LOCAL_STATE.bootstrap.defaultReportFile){
    try{
      const resp=await fetch(LOCAL_STATE.bootstrap.defaultReportFile);
      if(!resp.ok)throw new Error('fetch-failed');
      const report=normalizeReportDoc(await resp.json(), LOCAL_STATE.bootstrap.defaultReportFile);
      if(!report)throw new Error('invalid-report');
      registerReportDoc(report,'current');
      if(report.repos[0])setCurrentLocalRepo(report.fileName, report.repos[0].repoId);
      return;
    }catch(e){
      setLocalWarning(T('workspaceFetchWarn'));
    }
  }
  const legacySeed=window.AGENTLENS_LOCAL_DATA;
  if(legacySeed&&Array.isArray(legacySeed.repos)&&legacySeed.repos.length){
    const report=normalizeReportDoc({
      kind:'agentlens-report',
      schemaVersion:0,
      generatedAt:legacySeed.generatedAt||null,
      cliVersion:legacySeed.cliVersion||null,
      baselines:legacySeed.baselines||[],
      repos:legacySeed.repos,
    }, defaultReportFileName());
    if(report){
      registerReportDoc(report,'legacy');
      if(report.repos[0])setCurrentLocalRepo(report.fileName, report.repos[0].repoId);
    }
  }
}
