async function fetchOrgRepos(org){
  const targets=[
    {type:'organization',url:(page)=>`https://api.github.com/orgs/${org}/repos?per_page=100&page=${page}&type=public&sort=created&direction=desc`},
    {type:'user',url:(page)=>`https://api.github.com/users/${org}/repos?per_page=100&page=${page}&type=owner&sort=created&direction=desc`}
  ];
  for(const target of targets){
    const repos=[];
    let page=1;
    let notFound=false;
    while(true){
      let r;
      try{
        r=await fetch(target.url(page));
      }catch(e){return{error:'network'}}
      if(r.status===404){notFound=true;break}
      if(r.status===403||r.status===429)return{error:'ratelimit'};
      if(!r.ok)return{error:'network'};
      const data=await r.json();
      if(!Array.isArray(data))return{error:'network'};
      repos.push(...data);
      if(data.length<100)break;
      page++;
      await new Promise(res=>setTimeout(res,300));
    }
    if(!notFound)return{repos,ownerType:target.type};
  }
  return{error:'notfound'};
}

function sortedOrgConfigured(){

  else if(ORG_SCAN_STATE.sortBy==='stars')arr.sort((a,b)=>d*((b.stars||0)-(a.stars||0)));
  else if(ORG_SCAN_STATE.sortBy==='date')arr.sort((a,b)=>d*(new Date(b.createdAt)-new Date(a.createdAt)));

const ORG_SCAN_BATCH_SIZE=10;
const ORG_SCAN_BATCH_DELAY=600;
async function scanOrg(org){
  Object.assign(ORG_SCAN_STATE,{
    org,ownerType:null,totalRepos:0,scannedCount:0,scanning:true,done:false,
    repos:[],configured:[],unconfigured:[],
    selected:new Set(),page:0,sortBy:'tokens',sortDir:-1,unconfiguredVisible:false,
  });
  const thisOrg=org;
  showOrgPanel();
  renderOrgProgress('fetching');
  clearCmpStatus();
  const result=await fetchOrgRepos(org);
  if(ORG_SCAN_STATE.org!==thisOrg)return;
  if(result.error){renderOrgError(result.error);return}
  ORG_SCAN_STATE.ownerType=result.ownerType||'organization';
  const allRepos=result.repos;
  ORG_SCAN_STATE.totalRepos=allRepos.length;
  renderOrgProgress('scanning');
  for(let i=0;i<allRepos.length;i+=ORG_SCAN_BATCH_SIZE){
    if(ORG_SCAN_STATE.org!==thisOrg)return;
    const batch=allRepos.slice(i,i+ORG_SCAN_BATCH_SIZE);
    await Promise.all(batch.map(async repo=>{
      let scanData;
      try{
        scanData=await analyzeRepoData(repo.owner.login,repo.name);
      }catch(e){
        scanData={ok:false,error:'network'};
      }
      if(ORG_SCAN_STATE.org!==thisOrg)return;
      const entry={
        fullName:repo.full_name,
        name:repo.name,
        org:repo.owner.login,
        description:repo.description||'',
        stars:repo.stargazers_count||0,
        forks:repo.forks_count||0,
        language:repo.language||'',
        createdAt:repo.created_at||'',
        updatedAt:repo.updated_at||'',
        ...scanData,
      };
      ORG_SCAN_STATE.repos.push(entry);
      if(scanData.ok&&!scanData.noFiles){
        ORG_SCAN_STATE.configured.push(entry);
      }else{
        ORG_SCAN_STATE.unconfigured.push(entry);
      }
      ORG_SCAN_STATE.scannedCount++;
    }));
    renderOrgProgress('scanning');
    if(i+ORG_SCAN_BATCH_SIZE<allRepos.length){
      await new Promise(res=>setTimeout(res,ORG_SCAN_BATCH_DELAY));
    }
  }
  if(ORG_SCAN_STATE.org!==thisOrg)return;
  ORG_SCAN_STATE.scanning=false;
  ORG_SCAN_STATE.done=true;
  renderOrgResults();
}

function compareItemId(item){
  return item.type==='github-repo'?`gh:${item.key}`:`report:${item.file}:${item.repoId}`;
}
function addCompareItem(item,{silent=false}={}){
  const id=compareItemId(item);
  if(COMPARE_STATE.items.find(x=>compareItemId(x)===id))return false;
  if(COMPARE_STATE.items.length>=20){
    if(!silent)showCmpStatus(T('compareMax'),'warn');
    return false;
  }
  COMPARE_STATE.items.push(item);
  renderCmpQueue();
  return true;
}
function addToCompare(){

  const org=parseOrgUrl(url);

    document.getElementById('org-area-url').value=url;
    setArea('org');
    scanOrg(org.org);

  }
  const parsed=parseRepoUrl(url);
  if(!parsed){showCmpStatus(T('invalidGithubUrl'),'error');return}
  addCompareItem({type:'github-repo',key:`${parsed.owner}/${parsed.repo}`,owner:parsed.owner,repo:parsed.repo});
  document.getElementById('cmp-url').value='';

function addOrgFromArea(){

function loadComparisonDocument(comparison){
  if(comparison.embeddedReports){
    Object.entries(comparison.embeddedReports).forEach(([fileName,reportData])=>{
      const report=normalizeReportDoc(reportData,fileName);
      if(report)registerReportDoc(report,'import');
    });
    renderLocalWorkspace();
  }
  COMPARE_STATE.items=comparison.items.slice();
  document.getElementById('cmp-sel-model').value=comparison.settings.modelId||'claude-sonnet-4.6';
  document.getElementById('cmp-sl-devs').value=comparison.settings.devs||5;
  document.getElementById('cmp-sl-chats').value=comparison.settings.chats||15;

async function saveComparisonText(fileName, text){
  if(window.showSaveFilePicker){
    try{
      const handle=await window.showSaveFilePicker({
        suggestedName:fileName,
        types:[{ description:'JSON', accept:{ 'application/json':['.json'] } }],
      });
      const writable=await handle.createWritable();
      await writable.write(text);
      await writable.close();
      showCmpStatus(T('comparisonExported'),'loading');
      return;
    }catch(err){
      if(err&&err.name==='AbortError')return;
    }
  }
  const blob=new Blob([text],{ type:'application/json' });
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showCmpStatus(T('comparisonExported'),'loading');
}
async function exportComparison(){
  if(!COMPARE_STATE.items.length){
    showCmpStatus(T('compareNeedTwo'),'warn');
    return;
  }
  const embeddedReports={};
  COMPARE_STATE.items.forEach(item=>{
    if(item.type==='report-repo'){
      const entry=findReportEntry(item.file);
      if(entry&&!embeddedReports[entry.fileName])embeddedReports[entry.fileName]=entry.report;
    }
  });
  const payload={
    kind:'agentlens-comparison',
    schemaVersion:1,
    generatedAt:new Date().toISOString(),
    title:'AgentLens Comparison',
    settings:{
      modelId:document.getElementById('cmp-sel-model').value,
      devs:+document.getElementById('cmp-sl-devs').value,
      chats:+document.getElementById('cmp-sl-chats').value,
    },
    embeddedReports:Object.keys(embeddedReports).length?embeddedReports:undefined,
    items:COMPARE_STATE.items.map(item=>item.type==='github-repo'
      ? { type:'github-repo', key:item.key }
      : { type:'report-repo', file:item.file, repoId:item.repoId }),
  };
  registerComparisonDoc(normalizeComparisonDoc(payload, 'agentlens-comparison.json'), 'import');
  await saveComparisonText('agentlens-comparison.json', JSON.stringify(payload, null, 2) + '\n');
}
async function runCompare(){
  if(COMPARE_STATE.items.length<2){
    showCmpStatus(T('compareNeedTwo'),'warn');
    return;
  }
  const btn=document.getElementById('cmp-run-btn');
  btn.disabled=true;document.getElementById('cmp-run-icon').textContent='⏳';
  document.getElementById('cmp-results').classList.add('hidden');
  COMPARE_STATE.results=[];

  for(let i=0;i<COMPARE_STATE.items.length;i++){
    const item=COMPARE_STATE.items[i];
    const label=item.type==='github-repo'?item.key:`${item.file}#${item.repoId}`;
    showCmpStatus(`<div class="cmp-progress"><div class="spinner"></div><span>${T('cmpScanning')} <strong class="cmp-scanning">${esc(label)}</strong> (${i+1}/${COMPARE_STATE.items.length})…</span></div>`,'loading');
    if(item.type==='github-repo'){
      const data=await analyzeRepoData(item.owner,item.repo);
      COMPARE_STATE.results.push({ item, source:'github', key:item.key, ...data });
      continue;
    }
    const resolved=resolveCompareItem(item);
    if(!resolved.ok){
      COMPARE_STATE.results.push({ item, source:'local', ok:false, error:resolved.error });
      continue;
    }
    COMPARE_STATE.results.push({ item, source:'local', key:resolved.repo.repoName, ok:true, ...resolved.repo });
  }

  clearCmpStatus();
  renderCompareResults();
  btn.disabled=COMPARE_STATE.items.length<2;
  document.getElementById('cmp-run-icon').textContent='⚖️';
  document.getElementById('cmp-results').scrollIntoView({behavior:'smooth',block:'start'});
}

function openCompareResult(index){
  const r=COMPARE_STATE.results[index];
  if(!r||!r.ok)return;
  const repoLabel=r.source==='github'?r.key:(r.repoName||r.key||`${r.item&&r.item.file||'repo'}`);
  const branchLabel=r.branch||repoLabel;
  const foundByTool=r.foundByTool||{};
  const uniqueRefs=(r.uniqueRefs||[]).map(normalizeRef);
  STATE.analyzed=true;
  STATE.foundByTool=foundByTool;
  STATE.uniqueRefs=uniqueRefs;
  STATE.totalContextTokens=Number(r.totalContextTokens)||calcMaxToolViewTokens(foundByTool,uniqueRefs);
  document.getElementById('repo-url').value=r.source==='github'&&r.key?`https://github.com/${r.key}`:repoLabel;
  clearStatus();
  renderDetection(foundByTool,uniqueRefs,branchLabel);
  renderDetectionExtras(repoLabel,foundByTool,STATE.totalContextTokens);
  document.getElementById('results').classList.remove('hidden');
  document.getElementById('empty-state').classList.add('hidden');
  recalcCost();
  setArea('analyze');
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

function renderCompareResults(){
  const results=COMPARE_STATE.results;
  if(!results.length)return;

  const modelId=document.getElementById('cmp-sel-model').value;
  const m=PRICING[modelId];
  const devs=+document.getElementById('cmp-sl-devs').value;
  const chats=+document.getElementById('cmp-sl-chats').value;
  document.getElementById('cmp-val-devs').textContent=devs;
  document.getElementById('cmp-val-chats').textContent=chats;
  const isBRL=document.getElementById('chk-brl').checked;

  function costFor(tok){
    const cached=Math.round(tok*0.7);const uncached=tok-cached;
    const ic=(uncached/1e6)*m.input;const cc=(cached/1e6)*(m.cacheRead||0);
    const cw=m.cacheWrite?(cached/1e6)*m.cacheWrite*0.05:0;
    const oc=(2000/1e6)*m.output;
    return ic+cc+cw+oc;
  }

  // Horizontal bar chart
  if(COMPARE_STATE.chart)COMPARE_STATE.chart.destroy();
  COMPARE_STATE.chart=new Chart(document.getElementById('chart-compare'),{
    type:'bar',
    data:{
      labels:results.map(r=>r.source==='github'?r.key.split('/').pop():(r.ok?(r.repoName||r.key):'missing')),
      datasets:[{
        label:'tokens',
        data:results.map(r=>r.totalContextTokens||0),
        backgroundColor:results.map(r=>{const t=r.totalContextTokens||0;return t<5000?'#16a34a':t<10000?'#d97706':t<20000?'#ea580c':'#dc2626'}),
        borderRadius:8,borderSkipped:false
      }]
    },
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmtTok(ctx.parsed.x)+' tokens'}}},
      scales:{x:{grid:{color:THEME==='dark'?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'},ticks:{color:'#64748b',callback:v=>fmtTok(v)}},y:{grid:{display:false},ticks:{color:'#64748b'}}}
    }
  });

  // Table
  const colLabels=[T('cmpColRepo'),T('cmpColTools'),T('cmpColTokens'),T('thReq'),T('thDay'),T('thMonth'),T('thYear'),T('cmpColAction')];
  const hdr=`<thead><tr>${colLabels.map((h,i)=>`<th class="${i>1?'num':''}">${h}</th>`).join('')}</tr></thead>`;

  const rows=results.map((r,i)=>{
    if(!r.ok){
      const errMsg=r.source==='local'
        ? T('compareMissingFile')
        : ({private:T('cmpErrPrivate'),network:T('cmpErrNetwork'),notfound:T('cmpErrNotFound')}[r.error]||r.error);
      const label=r.source==='github'
        ? `<a href="https://github.com/${r.key}" target="_blank" style="color:var(--blue);font-weight:700;text-decoration:none">${r.key}</a>`
        : `<span style="font-weight:700;color:var(--g900)">${esc(r.item.file)}#${esc(r.item.repoId)}</span>`;
      return`<tr><td>${label}</td><td colspan="7" style="color:var(--red);font-size:.82rem">⚠ ${esc(errMsg)}</td></tr>`;
    }
    const tok=r.totalContextTokens||0;
    const pr=costFor(tok);const pd=pr*devs*chats;const pm=pd*22;const py=pm*12;
    const hc=tok<5000?'#16a34a':tok<10000?'#d97706':tok<20000?'#ea580c':'#dc2626';
    const foundToolIds=Object.keys(r.foundByTool||{});
    const pills=foundToolIds.map(tid=>{const t=AGENT_TOOLS.find(x=>x.id===tid);return t?`<span style="background:${t.color}22;color:${t.color};border-radius:99px;padding:1px 7px;font-size:.67rem;font-weight:700;display:inline-block;margin:1px">${t.icon} ${t.name}</span>`:''}).join('');
    const label=r.source==='github'
      ? `<a href="https://github.com/${r.key}" target="_blank" style="color:var(--blue);font-weight:700;text-decoration:none">${r.key}</a>`
      : `<span style="color:var(--g900);font-weight:700">${esc(r.repoName||r.key)}</span><br><span style="font-size:.72rem;color:var(--g400)">${esc(r.item.file)}</span>`;
    return`<tr>
      <td>${label}${r.noFiles?`<br><span style="font-size:.72rem;color:var(--g400)">${T('cmpNoConfigs')}</span>`:''}</td>
      <td>${pills||`<span style="color:var(--g400);font-size:.8rem">—</span>`}</td>
      <td class="num"><span style="color:${hc};font-weight:800">${fmtTok(tok)}</span></td>
      <td class="num">${fmt(pr)}</td>
      <td class="num">${fmt(pd)}</td>
      <td class="num">${fmt(pm)}</td>
      <td class="num">${fmt(py)}</td>
      <td class="num"><button class="action-btn" style="padding:6px 10px;font-size:.75rem" onclick="openCompareResult(${i})">${T('cmpOpenAnalysis')}</button></td>
    </tr>`;
  }).join('');

  document.getElementById('cmp-result-table').innerHTML=hdr+'<tbody>'+rows+'</tbody>';
  document.getElementById('cmp-results').classList.remove('hidden');
  renderScatterPlot(results);
}

    <div class="heavy-warn-intro"><span>${T('heavyRefIntro')(fmtTok(ref.tokens), pct)}</span></div>

      ${fix(T('heavyFixRemoveTitle'), T('heavyFixRemoveDesc'), null)}

}

function renderDetection(foundByTool,uniqueRefs,branch){
  const foundToolIds=Object.keys(foundByTool);
  const foundTools=AGENT_TOOLS.filter(t=>foundToolIds.includes(t.id));
  const agentTok=foundTools.reduce((s,t)=>s+estimateTokens(foundByTool[t.id].content),0);
  const foundRefs=uniqueRefs.filter(r=>r.found);
  const sharedRefs=uniqueRefs.filter(r=>r.found&&r.fromTools.size>1);
  const allContextTok=calcAllContextTokens(foundByTool,uniqueRefs);
  const maxViewTok=calcMaxToolViewTokens(foundByTool,uniqueRefs);
  const nonSimulGap=Math.max(0,allContextTok-maxViewTok);

  // Stats
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card green"><div class="stat-num">${foundTools.length}</div><div class="stat-label">${T('tools')}</div></div>
    <div class="stat-card blue"><div class="stat-num">${fmtTok(agentTok)}</div><div class="stat-label">${T('configTokens')}</div></div>
    <div class="stat-card purple"><div class="stat-num">${uniqueRefs.length}</div><div class="stat-label">${T('refs')}</div></div>
    <div class="stat-card orange"><div class="stat-num">${fmtTok(maxViewTok)}</div><div class="stat-label">${T('totalContext')}</div></div>
    ${sharedRefs.length?`<div class="stat-card teal"><div class="stat-num">${sharedRefs.length}</div><div class="stat-label">${T('shared')}</div></div>`:''}
    ${nonSimulGap>0?`<div class="stat-card pink"><div class="stat-num">−${fmtTok(nonSimulGap)}</div><div class="stat-label">${T('dedupSaved')}</div></div>`:''}`;

  // Savings banner
  const ban=document.getElementById('savings-banner');
  if(nonSimulGap>0){ban.classList.remove('hidden');ban.innerHTML=`<div class="s-icon">♻️</div><div class="s-body"><div class="s-title">${T('dedupTitle')}</div><div class="s-detail">${T('dedupDetail')(foundTools.length,fmtTok(allContextTok),fmtTok(maxViewTok))}</div></div><div class="s-num">−${fmtTok(nonSimulGap)} tok</div>`}else ban.classList.add('hidden');

  // Tool grid
  document.getElementById('tools-found-pill').textContent=`${foundTools.length} / ${AGENT_TOOLS.length}`;
  document.getElementById('tool-grid').innerHTML=AGENT_TOOLS.map(t=>{const f=!!foundByTool[t.id];const tk=f?estimateTokens(foundByTool[t.id].content):0;return`<div class="tool-card ${f?'found':'missing'}"><div class="tool-icon">${t.icon}</div><div class="tool-info"><div class="tool-name">${t.name}</div><div class="tool-file">${f?foundByTool[t.id].path:t.files[0]}</div>${f?`<div style="font-size:.72rem;color:var(--green);font-weight:700;margin-top:1px">~${fmtTok(tk)} ${T('tokens')}</div>`:''}</div>${f?'<div class="found-dot"></div>':'<div class="miss-dot"></div>'}</div>`}).join('');

  // Context tree
  const treeItems=[];
  for(const tool of foundTools){const{path,content}=foundByTool[tool.id];const tk=estimateTokens(content);
    treeItems.push(`<div class="tree-item"><span style="font-size:1.1rem">${tool.icon}</span><span class="t-path root">${path}</span><div class="t-right"><span class="t-tool" ${toolPill(tool.id)}>${tool.name}</span><span class="t-tok">~${fmtTok(tk)} tok</span></div></div>`);
    const toolRefs=uniqueRefs.filter(r=>r.fromTools.has(tool.id));
    for(const ref of toolRefs){const isShared=ref.fromTools.size>1;const first=[...ref.fromTools][0];const isDup=isShared&&first!==tool.id;
      const icon=!ref.found?'❓':/\.md/.test(ref.path)?'📄':/\.json/.test(ref.path)?'📋':/\.(ts|js|py|go|rs|rb)$/.test(ref.path)?'🟨':'📁';
      treeItems.push(`<div class="tree-item" style="padding-left:18px"><span style="color:var(--g400);margin-right:3px">└─</span><span style="font-size:.9rem">${icon}</span><span class="${isDup?'t-path dedup':'t-path'}" style="${!ref.found?'color:var(--red)':''}">${ref.path}</span><div class="t-right">${isShared?`<span class="t-tool" style="background:#0d948822;color:var(--teal);border-radius:99px;padding:1px 7px;font-size:.67rem;font-weight:700">${isDup?T('already'):T('shared')}</span>`:''}<span class="t-tok">${!ref.found?T('missing'):isDup?'':('~'+fmtTok(ref.tokens)+' tok')}</span></div></div>`)}}
  document.getElementById('context-tree').innerHTML=treeItems.join('');
  document.getElementById('tree-count-pill').textContent=`${foundTools.length} + ${uniqueRefs.length} ${T('files')}`;

  // Agent file viewers
  document.getElementById('agent-files-pill').textContent=`${foundTools.length} ${T('found')}`;
  document.getElementById('agent-files-list').innerHTML=foundTools.map((tool,i)=>{const{path,content}=foundByTool[tool.id];const tk=estimateTokens(content);const bid=`ab-${i}`,rid=`ar-${i}`,wid=`aw-${i}`;
    FILE_CONTENTS[bid]=content;
    const hasKey=hasApiKey();
    const tBtn=hasKey?`<button class="icon-btn" onclick="event.stopPropagation();toggleTranslatePanel('${bid}')" title="${T('translateBtn')}">🌐</button>`:'';
    const tPanel=hasKey?`<div class="translate-panel" id="tp-${bid}"><div class="translate-controls"><select id="td-${bid}"><option value="en">PT → EN</option><option value="pt">EN → PT</option></select><button class="t-run-btn" onclick="runTranslate('${bid}')">${T('translateBtn')}</button><button class="t-close-btn" onclick="toggleTranslatePanel('${bid}')">✕</button></div><div class="translate-result" id="tr-${bid}"></div><div class="translate-status" id="ts-${bid}"></div></div>`:'';
    const isMd=true;
    return`<div class="agent-file-block" id="${bid}"><div class="agent-file-header" onclick="toggleAgentFile(this)"><div class="agent-file-title"><span style="font-size:1.2rem">${tool.icon}</span><span class="file-badge">${path}</span><span style="color:var(--g500);font-size:.8rem">${tool.name}</span></div><div style="display:flex;align-items:center;gap:7px"><span class="token-badge">~${fmtTok(tk)} tok</span>${tBtn}<button class="icon-btn copy-btn" onclick="event.stopPropagation();copyBlock('${bid}')" title="${T('fsCopy')}">📋</button><button class="icon-btn" onclick="event.stopPropagation();openFullscreen('${bid}','${tool.icon}','${path}',${isMd})" title="${T('fsExpand')}">⛶</button><span style="color:var(--g400)">▾</span></div></div>${tPanel}<div class="agent-file-body"><div class="tab-bar"><button class="tab-btn active" onclick="switchTab(this,'${rid}','${bid}')">${T('rendered')}</button><button class="tab-btn" onclick="switchTab(this,'${wid}','${bid}')">${T('raw')}</button></div><div class="tab-content active" id="${rid}"><div class="md-body">${renderMd(content)}</div></div><div class="tab-content" id="${wid}"><div class="raw-code">${content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div></div></div>`}).join('');

  // Refs
  const missingRefs=uniqueRefs.filter(r=>!r.found);
  document.getElementById('refs-count-pill').textContent=`${foundRefs.length} ${T('resolved')} · ${missingRefs.length} ${T('missing')}`;
  if(!uniqueRefs.length){document.getElementById('refs-grid').innerHTML=`<div class="empty-state" style="padding:36px;background:var(--card);border:1px solid var(--card-border);border-radius:12px"><div class="icon">🔍</div><h3>${T('noRefs')}</h3><p>${T('noRefsP')}</p></div>`;return}
  document.getElementById('refs-grid').innerHTML=uniqueRefs.map((ref,ri)=>{const isShared=ref.fromTools.size>1;const rfid=`rc-${ri}`;
    if(ref.found&&ref.content)FILE_CONTENTS[rfid]=ref.content;
    const hasKey=hasApiKey();
    const isHeavy=ref.found&&ref.tokens>=HEAVY_REF_THRESHOLD;
    const tags=[ref.found?`<span class="ref-tag found">✓</span>`:`<span class="ref-tag missing">✗</span>`,`<span class="ref-tag type">${ref.type}</span>`,isShared?`<span class="ref-tag shared">${T('shared')} ×${ref.fromTools.size}</span>`:'',isHeavy?`<span class="ref-tag heavy">${T('heavyRefBadge')}</span>`:'',ref.found?`<span class="token-badge">~${fmtTok(ref.tokens)} tok</span>`:'',...[...ref.fromTools].map(tid=>{const tt=AGENT_TOOLS.find(x=>x.id===tid);return tt?`<span class="t-tool" ${toolPill(tid)}>${tt.icon}</span>`:''})].join('');
    const cnt=ref.found?(/\.(md|mdx)$/.test(ref.path)?`<div class="md-body">${renderMd(ref.content)}</div>`:`<div class="raw-code">${ref.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`):`<p style="color:var(--red);font-style:italic;padding:6px 0">${T('missing')} (${branch})</p>`;
    const refIcon=/\.md$/.test(ref.path)?'📄':/\.json$/.test(ref.path)?'📋':/\.(ts|js|py|go|rs|rb)$/.test(ref.path)?'🟨':'📁';
    const refIsMd=/\.(md|mdx)$/.test(ref.path);
    const copyBtn=ref.found?`<button class="icon-btn copy-btn" onclick="event.stopPropagation();copyBlock('${rfid}')" title="${T('fsCopy')}">📋</button>`:'';
    const fsBtn=ref.found?`<button class="icon-btn" onclick="event.stopPropagation();openFullscreen('${rfid}','${refIcon}','${ref.path}',${refIsMd})" title="${T('fsExpand')}">⛶</button>`:'';
    const tBtn=hasKey&&ref.found?`<button class="icon-btn" onclick="event.stopPropagation();toggleTranslatePanel('${rfid}')" title="${T('translateBtn')}">🌐</button>`:'';
    const tPanel=hasKey&&ref.found?`<div class="translate-panel" id="tp-${rfid}"><div class="translate-controls"><select id="td-${rfid}"><option value="en">PT → EN</option><option value="pt">EN → PT</option></select><button class="t-run-btn" onclick="runTranslate('${rfid}')">${T('translateBtn')}</button><button class="t-close-btn" onclick="toggleTranslatePanel('${rfid}')">✕</button></div><div class="translate-result" id="tr-${rfid}"></div><div class="translate-status" id="ts-${rfid}"></div></div>`:'';
    const heavyPanel=isHeavy?renderHeavyWarnPanel(ref):'';
    return`<div class="ref-card ${!ref.found?'not-found':''} ${isHeavy?'heavy':''}" id="${rfid}"><div class="ref-card-header" onclick="toggleRef(this)"><span class="ref-path">${ref.path}</span><div class="ref-meta">${tags}${copyBtn}${fsBtn}${tBtn}<span style="color:var(--g400)">▾</span></div></div>${tPanel}${heavyPanel}<div class="ref-content">${cnt}</div></div>`}).join('');

  // Render Context Health
  renderHealth(foundByTool, uniqueRefs);
}

let _scatterChart=null;
function renderScatterPlot(results){
  const el=document.getElementById('scatter-section');
  const canvas=document.getElementById('chart-compare-scatter');
  if(!results||!results.length){el.style.display='none';return;}

  const modelId=document.getElementById('cmp-sel-model').value;
  const m=PRICING[modelId];
  const devs=+document.getElementById('cmp-sl-devs').value;
  const chats=+document.getElementById('cmp-sl-chats').value;

  function costFor(tok){
    const cached=Math.round(tok*0.7);const uncached=tok-cached;
    const ic=(uncached/1e6)*m.input;const cc=(cached/1e6)*(m.cacheRead||0);
    const cw=m.cacheWrite?(cached/1e6)*m.cacheWrite*0.05:0;
    const oc=(2000/1e6)*m.output;
    return(ic+cc+cw+oc)*devs*chats*22;
  }

  const validResults=results.filter(r=>r.ok&&!r.noFiles);
  if(validResults.length<2){el.style.display='none';return;}

  const pts=validResults.map(r=>({
    x:r.totalContextTokens||0,
    y:+costFor(r.totalContextTokens||0).toFixed(2),
    label:r.source==='github'?(r.key||'').split('/').pop():(r.repoName||r.key||''),
  }));

  if(_scatterChart)_scatterChart.destroy();
  _scatterChart=new Chart(canvas,{
    type:'scatter',
    data:{datasets:[{
      label:'repos',
      data:pts,
      backgroundColor:pts.map((_,i)=>`hsl(${(i*47)%360},65%,55%)`),
      pointRadius:8,pointHoverRadius:11,
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          label:ctx=>{const p=ctx.raw;return[p.label,`${fmtTok(p.x)} tokens`,`${fmt(p.y)}/month`];}
        }}
      },
      scales:{
        x:{title:{display:true,text:'Tokens',color:'#64748b'},ticks:{color:'#64748b',callback:v=>fmtTok(v)},grid:{color:THEME==='dark'?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'}},
        y:{title:{display:true,text:'Cost/month',color:'#64748b'},ticks:{color:'#64748b',callback:v=>fmt(v)},grid:{color:THEME==='dark'?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'}},
      }
    }
  });
  el.style.display='';
}

function renderHistoricalSnapshots(){
  const timelineEl=document.getElementById('snapshots-timeline');
  const grouped=new Map();
  LOCAL_STATE.reports.forEach(entry=>{
    entry.report.repos.forEach(repo=>{
      const key=repo.repoName||repo.repoId;
      if(!grouped.has(key))grouped.set(key,[]);
      grouped.get(key).push({entry,repo});
    });
  });
  const multiSnap=[...grouped.values()].filter(arr=>arr.length>1);
  if(!multiSnap.length){timelineEl.classList.add('hidden');return;}
  const rows=multiSnap.flatMap(arr=>{
    const sorted=[...arr].sort((a,b)=>new Date(a.entry.report.generatedAt||0)-new Date(b.entry.report.generatedAt||0));
    return sorted.map((item,i)=>{
      const prev=sorted[i-1];
      const delta=prev?item.repo.totalContextTokens-(prev.repo.totalContextTokens||0):null;
      const dateStr=item.entry.report.generatedAt?new Date(item.entry.report.generatedAt).toLocaleString():'—';
      const deltaHtml=delta===null?''
        :delta>0?`<span class="snapshot-delta up">+${fmtTok(delta)}</span>`
        :delta<0?`<span class="snapshot-delta down">${fmtTok(delta)}</span>`
        :`<span class="snapshot-delta same">±0</span>`;
      return`<div class="snapshot-row">
        <span class="snapshot-date">${esc(dateStr)}</span>
        <span class="snapshot-repo">${esc(item.repo.repoName||item.repo.repoId)}</span>
        <span class="snapshot-tok">${fmtTok(item.repo.totalContextTokens||0)}</span>
        ${deltaHtml}
      </div>`;
    });
  }).join('');
  timelineEl.innerHTML=`<div class="snapshot-timeline"><div class="snapshot-timeline-title">${T('historicalSnapshots')}</div>${rows}</div>`;
  timelineEl.classList.remove('hidden');
}

const HEALTH_LIMITS = {
  codex:   { ideal:3000, warn:6000,  max:8000,  note:'healthCodexWarn' },
  claude:  { ideal:2000, warn:5000,  max:20000, note:'healthClaudeWarn' },
  cursor:  { ideal:2000, warn:5000,  max:10000, note:null },
  copilot: { ideal:1500, warn:3000,  max:5000,  note:'healthCopilotWarn' },
  windsurf:{ ideal:2000, warn:5000,  max:10000, note:null },
  aider:   { ideal:2000, warn:5000,  max:10000, note:null },
  devin:   { ideal:2000, warn:5000,  max:10000, note:null },
};

function healthGrade(tokens, limit) {
  const ratio = tokens / limit.warn;
  if (ratio <= 0.5) return { label: 'healthLean', color: 'var(--green)', bg: 'var(--green-l)', pct: Math.min(100, (tokens / limit.max) * 100) };
  if (ratio <= 1.0) return { label: 'healthModerate', color: 'var(--yellow)', bg: 'var(--yellow-l)', pct: Math.min(100, (tokens / limit.max) * 100) };
  if (ratio <= 1.6) return { label: 'healthHeavy', color: 'var(--orange)', bg: 'var(--orange-l)', pct: Math.min(100, (tokens / limit.max) * 100) };
  return { label: 'healthBloated', color: 'var(--red)', bg: 'var(--red-l)', pct: 100 };
}

function recalcCost(){
  if(!STATE.analyzed)return;
  updateSliderLabels();

  const modelId=document.getElementById('sel-model').value;
  const m=PRICING[modelId];
  const outputTok=parseInt(document.getElementById('sel-output').value);
  const devs=parseInt(document.getElementById('sl-devs').value);
  const chats=parseInt(document.getElementById('sl-chats').value);
  const cacheRate=parseInt(document.getElementById('sl-cache').value)/100;
  const isBRL=document.getElementById('chk-brl').checked;

  const ctxTok=STATE.totalContextTokens;
  const cachedTok=Math.round(ctxTok*cacheRate);
  const uncachedTok=ctxTok-cachedTok;

  // Cost per request (in USD)
  const inputCost=(uncachedTok/1e6)*m.input;
  const cacheCost=(cachedTok/1e6)*(m.cacheRead||0);
  const cacheWriteCost=m.cacheWrite?((cachedTok/1e6)*m.cacheWrite*0.05):0; // ~5% of requests are cache misses/writes
  const outputCost=(outputTok/1e6)*m.output;
  const perReq=inputCost+cacheCost+cacheWriteCost+outputCost;

  const perDay=perReq*devs*chats;
  const perMonth=perDay*22;
  const perYear=perMonth*12;

  // KPIs
  document.getElementById('kpi-row').innerHTML=`
    <div class="kpi blue"><div class="k-num">${fmtTok(ctxTok)}</div><div class="k-label">${T('kpiContext')}</div></div>
    <div class="kpi green"><div class="k-num">${fmt(perReq)}</div><div class="k-label">${T('kpiReq')}</div></div>
    <div class="kpi orange"><div class="k-num">${fmt(perDay)}</div><div class="k-label">${T('kpiDay')}</div></div>
    <div class="kpi purple"><div class="k-num">${fmt(perMonth)}</div><div class="k-label">${T('kpiMonth')}</div></div>
    <div class="kpi red"><div class="k-num">${fmt(perYear)}</div><div class="k-label">${T('kpiYear')}</div></div>`;

  // Breakdown donut
  const brkData=[inputCost+cacheWriteCost,cacheCost,outputCost].map(v=>+(v*devs*chats*22).toFixed(2));
  if(chartBreakdown)chartBreakdown.destroy();
  chartBreakdown=new Chart(document.getElementById('chart-breakdown'),{type:'doughnut',data:{labels:[T('brkInput'),T('brkCache'),T('brkOutput')],datasets:[{data:brkData,backgroundColor:['#2547f4','#14b8a6','#f59e0b'],borderWidth:2,borderColor:THEME==='dark'?'#0f1629':'#ffffff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11,weight:'bold'},padding:12,color:THEME==='dark'?'#94a3b8':'#475569'}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt(ctx.parsed)}}}}});

  // Per-dev chart
  const devSteps=[1,5,10,25,50,100].filter(d=>d<=Math.max(devs*2,10));
  if(!devSteps.includes(devs))devSteps.push(devs);
  devSteps.sort((a,b)=>a-b);
  const devCosts=devSteps.map(d=>Math.round(perReq*d*chats*22));

  if(chartPerDev)chartPerDev.destroy();
  chartPerDev=new Chart(document.getElementById('chart-perdev'),{type:'bar',data:{labels:devSteps.map(d=>d+(LANG==='pt'?' devs':' devs')),datasets:[{label:T('perDevTitle'),data:devCosts,backgroundColor:devSteps.map(d=>d===devs?'#2547f4':'rgba(37,71,244,.35)'),borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.parsed.y)+' '+T('kpiMonth')}}},scales:{y:{ticks:{color:'#64748b',callback:v=>isBRL?'R$'+Math.round(v*BRL_RATE).toLocaleString('pt-BR'):'$'+v.toLocaleString()},grid:{color:THEME==='dark'?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'}},x:{grid:{display:false},ticks:{color:'#64748b'}}}}});

  // Update scenario card costs
  function scenarioCost(d,c){const pd=(perReq)*d*c;return pd*22;}
  const scCosts=[[1,10,'sc-solo-cost'],[5,15,'sc-team-cost'],[20,30,'sc-large-cost']];
  scCosts.forEach(([d,c,id])=>{const el=document.getElementById(id);if(el)el.textContent=fmt(scenarioCost(d,c));});

  // Comparison table (sortable)
  const table=document.getElementById('comparison-table');
  const sym=isBRL?'R$':'$';
  const colHeaders=[T('thModel'),T('thReq').replace('$',sym),T('thDay').replace('$',sym),T('thMonth').replace('$',sym),T('thYear').replace('$',sym)];
  const arrow=i=>sortCol===i?(sortDir===1?'▲':'▼'):'⇅';
  const hdr=`<thead><tr>${colHeaders.map((h,i)=>`<th class="${i?'num':''} sortable" onclick="sortTable(${i})" style="cursor:pointer;user-select:none;white-space:nowrap">${h} <span style="opacity:.4;font-size:.7rem">${arrow(i)}</span></th>`).join('')}</tr></thead>`;

  const rowData=Object.entries(PRICING).map(([id,p])=>{
    const ic=(uncachedTok/1e6)*p.input;
    const cc=(cachedTok/1e6)*(p.cacheRead||0);
    const cw=p.cacheWrite?((cachedTok/1e6)*p.cacheWrite*0.05):0;
    const oc=(outputTok/1e6)*p.output;
    const pr=ic+cc+cw+oc;
    const pd=pr*devs*chats;
    const pm=pd*22;
    const py=pm*12;
    return{id,name:p.name,provider:p.provider,vals:[pr,pd,pm,py]};
  });

  // Sort
  if(sortCol===0) rowData.sort((a,b)=>sortDir*a.name.localeCompare(b.name));
  else rowData.sort((a,b)=>sortDir*(a.vals[sortCol-1]-b.vals[sortCol-1]));

  const rows=rowData.map(r=>{
    const sel=r.id===modelId?'style="background:var(--blue-l);font-weight:700"':'';
    return`<tr ${sel}><td>${r.name}<br><span style="font-size:.7rem;color:var(--g500)">${r.provider}</span></td>${r.vals.map(v=>`<td class="num">${fmt(v)}</td>`).join('')}</tr>`;
  }).join('');
  table.innerHTML=hdr+'<tbody>'+rows+'</tbody>';
}

function sortTable(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=col===0?1:-1}
  recalcCost();
}

  const finish = () => { btn.textContent = '✓'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(finish).catch(() => { fallbackCopy(text); finish(); });
  } else { fallbackCopy(text); finish(); }
}

const FILE_CONTENTS = {};

function getApiKeys() {
  return {
    anthropic: localStorage.getItem('al-anthropic-key') || '',
    openai: localStorage.getItem('al-openai-key') || '',
    gemini: localStorage.getItem('al-gemini-key') || '',
  };
}
function hasApiKey() {
  const k = getApiKeys(); return !!(k.anthropic || k.openai || k.gemini);
}

function showApiKeysModal() {
  const k = getApiKeys();
  document.getElementById('ak-anthropic').value = k.anthropic;
  document.getElementById('ak-openai').value = k.openai;
  document.getElementById('ak-gemini').value = k.gemini;
  document.getElementById('api-keys-modal').classList.add('open');
}
function closeApiKeysModal() {
  document.getElementById('api-keys-modal').classList.remove('open');
}
function saveApiKeys() {
  const ak = document.getElementById('ak-anthropic').value.trim();
  const ok = document.getElementById('ak-openai').value.trim();
  const gk = document.getElementById('ak-gemini').value.trim();
  if (ak) localStorage.setItem('al-anthropic-key', ak); else localStorage.removeItem('al-anthropic-key');
  if (ok) localStorage.setItem('al-openai-key', ok); else localStorage.removeItem('al-openai-key');
  if (gk) localStorage.setItem('al-gemini-key', gk); else localStorage.removeItem('al-gemini-key');
  closeApiKeysModal();
  // Re-render to show/hide translate buttons
  const repo = currentLocalRepo();
  if (repo) renderDetection(repo.foundByTool || {}, repo.uniqueRefs || [], repo.repoName || '');
}

function copyBlock(blockId) {
  const text = FILE_CONTENTS[blockId] || '';
  const btn = document.querySelector('#' + blockId + ' .copy-btn');
  const finish = () => { if (btn) { btn.textContent = '✓'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1500); } };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(finish).catch(() => { fallbackCopy(text); finish(); });
  } else { fallbackCopy(text); finish(); }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea'); ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta);
  ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
}

function toggleTranslatePanel(blockId) {
  const panel = document.getElementById('tp-' + blockId);
  if (panel) panel.classList.toggle('open');
}

async function runTranslate(blockId) {
  const text = FILE_CONTENTS[blockId] || '';
  if (!text.trim()) return;
  const dir = document.getElementById('td-' + blockId).value;
  const result = document.getElementById('tr-' + blockId);
  const status = document.getElementById('ts-' + blockId);
  const btn = document.querySelector('#tp-' + blockId + ' .t-run-btn');

  result.classList.remove('show'); result.textContent = '';
  status.textContent = '⏳ ' + T('translating'); status.classList.add('show');
  if (btn) btn.disabled = true;

  const prompt = dir === 'en'
    ? 'Translate the following from Portuguese to English. Preserve all formatting, code blocks, lists, and technical terms exactly. Return only the translated content, no preamble.\n\n' + text
    : 'Translate the following from English to Portuguese. Preserve all formatting, code blocks, lists, and technical terms exactly. Return only the translated content, no preamble.\n\n' + text;

  try {
    const translated = await callTranslationApi(prompt);
    result.textContent = translated; result.classList.add('show');
    status.classList.remove('show');
  } catch (e) {
    status.textContent = '❌ ' + (e.message || 'Translation failed');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function callTranslationApi(prompt) {
  const k = getApiKeys();
  if (k.anthropic) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': k.anthropic, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 4096, messages: [{ role: 'user', content: prompt }] }),
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error('Anthropic ' + res.status + (e.error ? ': ' + e.error.message : '')); }
    const data = await res.json(); return data.content[0].text;
  }
  if (k.openai) {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + k.openai },
      body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: prompt }] }),
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error('OpenAI ' + res.status + (e.error ? ': ' + e.error.message : '')); }
    const data = await res.json(); return data.choices[0].message.content;
  }
  if (k.gemini) {
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + k.gemini, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
    });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error('Gemini ' + res.status + (e.error ? ': ' + e.error.message : '')); }
    const data = await res.json(); return data.candidates[0].content.parts[0].text;
  }
  throw new Error(T('noApiKey'));
}
